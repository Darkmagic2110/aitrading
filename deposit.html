<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Deposit - DARK MAGIC AI</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
padding:20px;
font-family:'Outfit',sans-serif;
background:radial-gradient(circle at top,#1a0f2e,#000);
color:#fff;
}

.container{
max-width:450px;
margin:50px auto;
background:rgba(20,20,20,.88);
padding:20px;
border-radius:24px;
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(10px);
}

h1{
text-align:center;
font-size:28px;
font-weight:800;
margin-bottom:20px;
background:linear-gradient(90deg,#fff,#999);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

input,button{
width:100%;
padding:14px;
margin-top:14px;
border:none;
outline:none;
border-radius:14px;
font-family:'Outfit',sans-serif;
}

input{
background:rgba(255,255,255,.05);
color:#fff;
border:1px solid rgba(255,255,255,.1);
}

button{
background:linear-gradient(135deg,#ff006a,#7b61ff);
color:#fff;
font-weight:700;
font-size:15px;
cursor:pointer;
}

#status{
margin-top:15px;
font-size:13px;
color:#aaa;
text-align:center;
}

.card{
margin-top:18px;
padding:14px;
border-radius:16px;
background:rgba(255,255,255,.03);
border:1px solid rgba(255,255,255,.08);
}

.small{
font-size:12px;
color:#aaa;
margin-top:6px;
}

</style>
</head>

<body>

<div class="container">

<h1>💳 Deposit Coins</h1>

<input type="number" id="amount" placeholder="Enter amount">

<button onclick="payNow()">DEPOSIT NOW</button>

<div id="status">Secure payment system</div>

<div class="card">
1 Coin = ₦1
<div class="small">
Minimum deposit recommended: ₦100
</div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://js.paystack.co/v1/inline.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyDvFDByPPo9zgwKLdPaREz1OVMQCXmPfrs",
authDomain:"bets-d795d.firebaseapp.com",
databaseURL:"https://bets-d795d-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

let currentUser=null;

firebase.auth().onAuthStateChanged(user=>{

if(!user){
window.location.href="login.html";
return;
}

currentUser=user;

});

/* PAYMENT */

function payNow(){

let amount=parseInt(document.getElementById("amount").value);

if(!amount || amount < 1){
alert("Enter valid amount");
return;
}

if(!currentUser){
alert("User not logged in");
return;
}

let handler=PaystackPop.setup({

key:"YOUR_PAYSTACK_PUBLIC_KEY",

email:currentUser.email,

amount:amount*100,

currency:"NGN",

ref:"DM"+Date.now(),

callback:function(response){

addBalance(amount);

},

onClose:function(){

document.getElementById("status").innerText="Payment cancelled";

}

});

handler.openIframe();

}

/* ADD BALANCE */

function addBalance(amount){

db.ref("users/"+currentUser.uid+"/balance").once("value").then(snap=>{

let currentBalance=snap.val()||0;

let newBalance=currentBalance+amount;

db.ref("users/"+currentUser.uid+"/balance").set(newBalance);

document.getElementById("status").innerText=
"Deposit successful. "+amount+" coins added.";

});

}

</script>

</body>
</html>
