<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Generate Key - DARK MAGIC AI</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
padding:18px;
font-family:'Outfit',sans-serif;
background:radial-gradient(circle at top,#1a0f2e,#000);
color:#fff;
}

/* CONTAINER */

.container{
max-width:460px;
margin:auto;
background:rgba(20,20,20,.9);
padding:20px;
border-radius:24px;
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(10px);
}

/* TITLE */

h1{
text-align:center;
font-size:28px;
font-weight:800;
margin-bottom:10px;
background:linear-gradient(90deg,#fff,#aaa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.sub{
text-align:center;
font-size:13px;
color:#aaa;
margin-bottom:20px;
}

/* BALANCE */

.balanceBox{
background:rgba(255,255,255,.04);
padding:14px;
border-radius:16px;
text-align:center;
margin-bottom:16px;
border:1px solid rgba(255,255,255,.06);
}

.balanceBox h2{
margin:8px 0 0;
color:#ffd700;
}

/* INPUT */

input{
width:100%;
padding:14px;
margin-top:12px;
border:none;
outline:none;
border-radius:16px;
background:rgba(255,255,255,.05);
color:#fff;
font-family:'Outfit',sans-serif;
box-sizing:border-box;
border:1px solid rgba(255,255,255,.08);
}

/* BUTTON */

button{
width:100%;
padding:15px;
margin-top:16px;
border:none;
border-radius:16px;
background:linear-gradient(135deg,#ff006a,#7b61ff);
color:#fff;
font-size:15px;
font-weight:700;
cursor:pointer;
font-family:'Outfit',sans-serif;
}

button:active{
transform:scale(.98);
}

/* INFO */

.infoBox{
margin-top:14px;
background:rgba(255,255,255,.03);
padding:14px;
border-radius:16px;
font-size:13px;
border:1px solid rgba(255,255,255,.06);
}

/* KEYS */

.keyList{
margin-top:18px;
}

.keyCard{
background:rgba(255,255,255,.03);
padding:14px;
border-radius:16px;
margin-top:12px;
border:1px solid rgba(255,255,255,.06);
word-break:break-all;
}

.keyText{
font-size:15px;
font-weight:700;
color:#00ff84;
}

.active{
color:#00ff84;
font-weight:700;
}

.expired{
color:#ff3355;
font-weight:700;
}

.copyBtn{
margin-top:10px;
padding:10px;
border:none;
border-radius:12px;
background:#222;
color:#fff;
cursor:pointer;
font-family:'Outfit',sans-serif;
}

.empty{
text-align:center;
color:#999;
margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>🔑 GENERATE KEY</h1>

<p class="sub">
10 Coins = 5 Minutes Access
</p>

<div class="balanceBox">
DM COINS
<h2 id="balance">0</h2>
</div>

<input
type="number"
id="coinAmount"
placeholder="Enter Coins To Use"
/>

<div class="infoBox">

<p>
⏳ Expiry Time:
<span id="expiryPreview">
0 Minutes
</span>
</p>

<p>
💰 Minimum Coins:
10 Coins
</p>

</div>

<button onclick="generateKey()">
GENERATE ACCESS KEY
</button>

<div class="keyList">

<h3>📜 Your Generated Keys</h3>

<div id="keysContainer"></div>

</div>

</div>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey: "AIzaSyDvFDByPPo9zgwKLdPaREz1OVMQCXmPfrs",

authDomain: "bets-d795d.firebaseapp.com",

projectId: "bets-d795d",

storageBucket: "bets-d795d.appspot.com",

messagingSenderId: "384386108287",

appId: "1:384386108287:android:d238a5ec8068d9bb9be84a",

databaseURL: "https://bets-d795d-default-rtdb.firebaseio.com"

};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

let currentUser=null;

let currentBalance=0;

/* AUTH */

firebase.auth().onAuthStateChanged(user=>{

if(!user){

window.location.href="login.html";

return;

}

currentUser=user;

loadBalance();

loadUserKeys();

});

/* LOAD BALANCE */

function loadBalance(){

db.ref("users/"+currentUser.uid+"/balance")

.on("value",snap=>{

currentBalance=snap.val() || 0;

document.getElementById("balance").innerText=
Math.floor(currentBalance);

});

}

/* LIVE EXPIRY PREVIEW */

document.getElementById("coinAmount")

.addEventListener("input",()=>{

const coins=parseInt(
document.getElementById("coinAmount").value
) || 0;

/*
10 COINS = 5 MINS
1 coin = 30 seconds
*/

const minutes=(coins*30)/60;

document.getElementById("expiryPreview").innerText=

minutes+" Minutes";

});

/* RANDOM KEY */

function randomKey(){

const chars=
"ABCDEFGHJKLMNPQRSTUVWXYZ123456789";

let key="DM-";

for(let i=0;i<16;i++){

key+=chars.charAt(
Math.floor(Math.random()*chars.length)
);

}

return key;

}

/* GENERATE KEY */

function generateKey(){

const coins=parseInt(
document.getElementById("coinAmount").value
);

if(isNaN(coins) || coins < 10){

alert("Minimum 10 Coins Required");

return;

}

if(coins > currentBalance){

alert("Insufficient Balance");

return;

}

/*
10 coins = 5 mins
1 coin = 30 seconds
*/

const duration=coins*30;

const key=randomKey();

const expireTime=
Date.now()+(duration*1000);

/* DEDUCT BALANCE */

db.ref("users/"+currentUser.uid+"/balance")

.set(currentBalance - coins)

/* SAVE KEY */

.then(()=>{

const keyData={

key:key,

uid:currentUser.uid,

email:currentUser.email,

coins:coins,

duration:duration,

createdAt:Date.now(),

expireTime:expireTime,

status:"active"

};

return db.ref("keys/"+key).set(keyData);

})

.then(()=>{

return db.ref(
"userKeys/"+currentUser.uid+"/"+key
).set(true);

})

.then(()=>{

alert("Key Generated Successfully");

/* RESET INPUT */

document.getElementById("coinAmount").value="";

document.getElementById("expiryPreview").innerText=
"0 Minutes";

/* REFRESH KEYS */

document.getElementById("keysContainer").innerHTML="";

loadUserKeys();

})

.catch(error=>{

alert(error.message);

});

}

/* LOAD USER KEYS */

function loadUserKeys(){

db.ref("userKeys/"+currentUser.uid)

.on("value",snap=>{

const container=
document.getElementById("keysContainer");

container.innerHTML="";

if(!snap.exists()){

container.innerHTML=
"<div class='empty'>No Generated Keys</div>";

return;

}

const data=snap.val();

const keys=Object.keys(data).reverse();

keys.forEach(key=>{

loadSingleKey(key);

});

});

}

/* LOAD SINGLE KEY */

function loadSingleKey(key){

db.ref("keys/"+key).once("value")

.then(snap=>{

if(!snap.exists())return;

const data=snap.val();

const now=Date.now();

const expired=now >= data.expireTime;

const div=document.createElement("div");

div.className="keyCard";

const status=expired

? "<span class='expired'>EXPIRED</span>"

: "<span class='active'>ACTIVE</span>";

const mins=Math.floor(data.duration/60);

div.innerHTML=`

<div class="keyText">
${key}
</div>

<br>

Status:
${status}

<br><br>

⏳ Duration:
${mins} Minutes

<br><br>

💰 Coins Used:
${data.coins}

<br><br>

📧 Email:
${data.email}

<br><br>

<button class="copyBtn"
onclick="copyKey('${key}')">

COPY KEY

</button>

`;

document.getElementById("keysContainer")
.appendChild(div);

});

}

/* COPY KEY */

function copyKey(key){

navigator.clipboard.writeText(key)

.then(()=>{

alert("Key Copied");

});

}

</script>

</body>
</html>
