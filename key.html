<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KEY GENERATOR - DARK MAGIC AI</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Outfit',sans-serif;
background:radial-gradient(circle at top,#1a0f2e,#000);
color:#fff;
padding:18px;
}

.container{
max-width:460px;
margin:60px auto;
background:rgba(20,20,20,.85);
padding:20px;
border-radius:20px;
border:1px solid rgba(255,255,255,.1);
backdrop-filter:blur(10px);
}

h1{
text-align:center;
font-size:24px;
}

input,select,button{
width:100%;
padding:14px;
margin-top:12px;
border-radius:12px;
border:none;
outline:none;
font-family:'Outfit',sans-serif;
}

input,select{
background:rgba(255,255,255,.05);
color:#fff;
border:1px solid rgba(255,255,255,.1);
}

button{
background:linear-gradient(135deg,#ff006a,#7b61ff);
color:#fff;
font-weight:700;
cursor:pointer;
}

#info{
margin-top:10px;
font-size:13px;
color:#aaa;
}

#keyBox{
margin-top:15px;
padding:12px;
background:rgba(255,255,255,.05);
border-radius:12px;
border:1px solid rgba(255,255,255,.1);
word-break:break-all;
}

.small{
font-size:12px;
color:#bbb;
margin-top:5px;
}
</style>
</head>

<body>

<div class="container">

<h1>🔑 KEY GENERATOR</h1>

<input id="coinInput" type="number" placeholder="Enter coins to spend (min 10)">

<select id="duration">
<option value="5">10 Coins = 5 Minutes</option>
<option value="10">20 Coins = 10 Minutes</option>
<option value="30">60 Coins = 30 Minutes</option>
</select>

<button onclick="generateKey()">GENERATE KEY</button>

<div id="info">Key will be linked to your email and deducted from balance</div>

<div id="keyBox" style="display:none;"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyDvFDByPPo9zgwKLdPaREz1OVMQCXmPfrs",
authDomain:"bets-d795d.firebaseapp.com",
databaseURL:"https://bets-d795d-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

let user=null;

/* AUTH */
firebase.auth().onAuthStateChanged(u=>{
if(!u){
location.href="login.html";
return;
}
user=u;
});

/* RANDOM KEY */
function makeKey(){
return "DM-" + Math.random().toString(36).substr(2,8).toUpperCase();
}

/* GENERATE */
function generateKey(){

let coins=parseInt(document.getElementById("coinInput").value);
let mins=parseInt(document.getElementById("duration").value);

if(!coins || coins < 10){
alert("Minimum 10 coins required");
return;
}

/* balance check */
db.ref("users/"+user.uid+"/balance").once("value",snap=>{
let bal=snap.val()||0;

if(bal < coins){
alert("Insufficient balance");
return;
}

/* deduct coins */
let newBal = bal - coins;

db.ref("users/"+user.uid+"/balance").set(newBal);

/* create key */
let key = makeKey();

db.ref("keys/"+key).set({
email:user.email,
expires:Date.now() + mins*60000,
createdAt:Date.now(),
coins:coins
});

/* show key */
document.getElementById("keyBox").style.display="block";
document.getElementById("keyBox").innerHTML=`
<b>YOUR KEY:</b><br>${key}
<br><div class="small">Valid for ${mins} minutes</div>
`;
});

}

</script>

</body>
</html>
