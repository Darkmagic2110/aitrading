<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OTC AI Signal Engine v4</title>

<style>
body {
    background:#0b1220;
    color:white;
    font-family:Arial;
    text-align:center;
}

.card {
    background:#111827;
    padding:20px;
    margin:10px;
    border-radius:12px;
    width:340px;
    display:inline-block;
}

#signal {
    font-size:55px;
    font-weight:bold;
}

#confidence {
    font-size:22px;
    color:#38bdf8;
}

.zone {
    color:#9ca3af;
    font-size:14px;
}
</style>
</head>

<body>

<h1>OTC AI Engine v4 (High Accuracy Mode)</h1>

<div class="card">
    <div id="asset">Asset: EUR/USD</div>
    <div id="signal">WAIT</div>
    <div id="confidence">0%</div>
    <div id="zone" class="zone">No Zone</div>
</div>

<script>
// ==========================
// MULTI-ASSET SIMULATION
// ==========================
let assets = {
    "EURUSD": [],
    "GBPUSD": [],
    "BTCUSD": []
};

let activeAsset = "EURUSD";

// Binance feed (BTC real-time base)
let socket = new WebSocket("wss://stream.binance.com:9443/ws/btcusdt@trade");

socket.onmessage = function(event) {
    let data = JSON.parse(event.data);
    let price = parseFloat(data.p);

    updateAssets(price);
    analyzeAll();
};

// ==========================
// UPDATE ALL SIMULATED PAIRS
// ==========================
function updateAssets(price) {

    // map BTC movement into FX-like behavior
    let eur = price * 0.00002;
    let gbp = price * 0.000025;
    let btc = price;

    push("EURUSD", eur);
    push("GBPUSD", gbp);
    push("BTCUSD", btc);
}

function push(asset, price) {
    assets[asset].push(price);
    if (assets[asset].length > 200) assets[asset].shift();
}

// ==========================
// EMA
// ==========================
function ema(period, data) {
    let k = 2 / (period + 1);
    let e = data[0];

    for (let i = 1; i < data.length; i++) {
        e = data[i] * k + e * (1 - k);
    }
    return e;
}

// ==========================
// RSI
// ==========================
function rsi(data) {
    let gain = 0, loss = 0;

    for (let i = data.length - 15; i < data.length; i++) {
        let diff = data[i] - data[i - 1];
        if (diff > 0) gain += diff;
        else loss -= diff;
    }

    let rs = gain / (loss || 1);
    return 100 - (100 / (1 + rs));
}

// ==========================
// SUPPORT / RESISTANCE
// ==========================
function supportResistance(data) {
    let min = Math.min(...data.slice(-20));
    let max = Math.max(...data.slice(-20));
    return { support: min, resistance: max };
}

// ==========================
// AI ADAPTIVE MEMORY (simple)
// ==========================
let bias = 0;

function adapt(signal) {
    if (signal === "BUY") bias += 0.1;
    if (signal === "SELL") bias -= 0.1;
    if (bias > 2) bias = 2;
    if (bias < -2) bias = -2;
}

// ==========================
// HIGH ACCURACY ENGINE
// ==========================
function analyzeAsset(name) {

    let data = assets[name];
    if (data.length < 30) return;

    let ema9 = ema(9, data);
    let ema21 = ema(21, data);
    let r = rsi(data);
    let zone = supportResistance(data);

    let price = data[data.length - 1];

    let score = 0;

    // TREND
    if (ema9 > ema21) score += 3;
    else score -= 3;

    // RSI
    if (r > 55) score += 2;
    else if (r < 45) score -= 2;

    // SUPPORT / RESISTANCE FILTER
    if (price > zone.resistance * 0.999) score -= 2;
    if (price < zone.support * 1.001) score -= 2;

    // AI BIAS
    score += bias;

    // HIGH ACCURACY MODE FILTER (STRICT)
    if (Math.abs(score) < 5) {
        return show(name, "WAIT", 0, zone);
    }

    let confidence = Math.min(100, Math.abs(score) * 12);

    let signal = "WAIT";

    if (score >= 5) signal = "BUY";
    if (score <= -5) signal = "SELL";

    adapt(signal);

    show(name, signal, confidence, zone);
}

// ==========================
// RUN ALL ASSETS
// ==========================
function analyzeAll() {

    analyzeAsset("EURUSD");

}

// ==========================
// UI
// ==========================
function show(name, signal, confidence, zone) {

    document.getElementById("asset").innerText = "Asset: " + name;
    document.getElementById("signal").innerText = signal;
    document.getElementById("confidence").innerText =
        "Confidence: " + confidence.toFixed(0) + "%";

    document.getElementById("zone").innerText =
        "Support: " + zone.support.toFixed(4) +
        " | Resistance: " + zone.resistance.toFixed(4);

    let s = document.getElementById("signal");

    if (signal === "BUY") s.style.color = "lime";
    else if (signal === "SELL") s.style.color = "red";
    else s.style.color = "yellow";
}
</script>

</body>
</html>
