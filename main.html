<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>DARK MAGIC AI</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Outfit',sans-serif;
background:radial-gradient(circle at top,#1a0f2e,#000);
color:#fff;
padding:18px;
overflow-y:auto;
}

.container{
max-width:470px;
margin:auto;
background:rgba(20,20,20,.88);
border-radius:24px;
padding:20px;
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(10px);
position:relative;
}

/* TOP BAR */

.topBar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.logoText{
font-size:22px;
font-weight:800;
background:linear-gradient(90deg,#fff,#aaa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.coinBox{
display:flex;
align-items:center;
gap:10px;
background:rgba(255,255,255,.05);
padding:10px 14px;
border-radius:16px;
border:1px solid rgba(255,255,255,.08);
cursor:pointer;
transition:.2s;
}

.coinBox:active{
transform:scale(.97);
}

.plusBtn{
width:28px;
height:28px;
border-radius:50%;
background:linear-gradient(135deg,#ff006a,#7b61ff);
display:flex;
justify-content:center;
align-items:center;
font-size:20px;
font-weight:700;
}

.coinText{
font-size:14px;
font-weight:700;
}

.sub{
text-align:center;
font-size:13px;
color:#aaa;
margin-top:8px;
margin-bottom:18px;
}

select,button{
width:100%;
margin-top:12px;
padding:14px;
border-radius:16px;
border:none;
outline:none;
font-family:'Outfit',sans-serif;
}

select{
background:rgba(255,255,255,.05);
color:#fff;
border:1px solid rgba(255,255,255,.1);
}

button{
background:linear-gradient(135deg,#ff006a,#7b61ff);
color:#fff;
font-weight:700;
cursor:pointer;
font-size:15px;
transition:.2s;
}

button:active{
transform:scale(.98);
}

.circle{
width:230px;
height:230px;
margin:22px auto;
border-radius:50%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:38px;
font-weight:800;
border:4px solid #444;
text-align:center;
transition:.4s;
}

.buy{
color:#00ff84;
border-color:#00ff84;
box-shadow:0 0 50px #00ff84;
}

.sell{
color:#ff3355;
border-color:#ff3355;
box-shadow:0 0 50px #ff3355;
}

.hold{
color:#ffcc00;
border-color:#ffcc00;
box-shadow:0 0 35px #ffcc00;
}

.box,.signalBox,.history{
margin-top:14px;
background:rgba(255,255,255,.03);
padding:14px;
border-radius:16px;
border:1px solid rgba(255,255,255,.06);
font-size:13px;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
margin-top:14px;
}

.card{
background:rgba(255,255,255,.03);
padding:12px;
border-radius:16px;
text-align:center;
border:1px solid rgba(255,255,255,.06);
}

.card h2{
margin:6px 0 0;
font-size:24px;
}

.win{
color:#00ff84;
}

.loss{
color:#ff3355;
}

.historyItem{
padding:10px;
border-bottom:1px solid rgba(255,255,255,.06);
font-size:12px;
}

.badge{
padding:4px 8px;
border-radius:8px;
font-size:11px;
font-weight:700;
}

.buyBadge{
background:#003d22;
color:#00ff84;
}

.sellBadge{
background:#3d0012;
color:#ff3355;
}

.signalPower{
margin-top:10px;
font-size:14px;
font-weight:700;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<!-- TOP BAR -->

<div class="topBar">

<div class="logoText">
⚡ DARK MAGIC AI
</div>

<div class="coinBox" onclick="window.location.href='deposit.html'">

<div class="plusBtn">
+
</div>

<div class="coinText">
🪙 <span id="coinBalance">0</span>
</div>

</div>

</div>

<p class="sub">
Continuous Trend Signal Engine 📊
</p>

<select id="pair">
<option value="frxEURUSD">EUR/USD</option>
<option value="frxGBPUSD">GBP/USD</option>
<option value="frxUSDJPY">USD/JPY</option>
<option value="frxAUDUSD">AUD/USD</option>
<option value="frxEURJPY">EUR/JPY</option>
<option value="frxUSDCHF">USD/CHF</option>
</select>

<button onclick="start()">
▶ START BOT
</button>

<div id="circle" class="circle hold">

<div>
WAIT
</div>

<div style="font-size:14px">
EXP: --
</div>

</div>

<div class="signalPower">
Signal Accuracy:
<span id="accuracy">0%</span>
</div>

<div class="box">

<p>💰 Price: <span id="price">--</span></p>

<p>📊 RSI: <span id="rsi">--</span></p>

<p>📈 EMA FAST: <span id="emaFast">--</span></p>

<p>📉 EMA SLOW: <span id="emaSlow">--</span></p>

<p>⚡ MACD: <span id="macd">--</span></p>

<p>🔥 Strength: <span id="strength">--</span></p>

<p>📈 Trend: <span id="trend">--</span></p>

</div>

<div class="signalBox">

<p>
📡 Signal:
<span id="sig">WAIT</span>
</p>

<p>
⏳ Countdown:
<span id="countdown">--</span>
</p>

<p>
🎯 Result:
<span id="result">--</span>
</p>

</div>

<div class="stats">

<div class="card">
Signals
<h2 id="total">0</h2>
</div>

<div class="card">
Wins
<h2 id="wins" class="win">0</h2>
</div>

<div class="card">
Loss
<h2 id="losses" class="loss">0</h2>
</div>

</div>

<div class="history">

<h3>
📜 Signal History
</h3>

<div id="history"></div>

</div>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
onValue,
set,
get,
update
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* =========================
   FIREBASE CONFIG
========================= */

const firebaseConfig = {

apiKey: "YOUR_API_KEY",

authDomain: "YOUR_PROJECT.firebaseapp.com",

databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",

projectId: "YOUR_PROJECT",

storageBucket: "YOUR_PROJECT.appspot.com",

messagingSenderId: "123456789",

appId: "YOUR_APP_ID"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

/* =========================
   USER ID
========================= */

let userId = localStorage.getItem("darkmagic_uid");

if(!userId){

userId = "user_" + Math.random().toString(36).substring(2);

localStorage.setItem("darkmagic_uid",userId);

}

/* =========================
   COIN SYSTEM
========================= */

const coinRef = ref(db,"users/"+userId);

/* CREATE DEFAULT */

get(coinRef).then((snapshot)=>{

if(!snapshot.exists()){

set(coinRef,{
coins:0
});

}

});

/* LIVE FETCH */

onValue(coinRef,(snapshot)=>{

if(snapshot.exists()){

const data = snapshot.val();

document.getElementById("coinBalance").innerText =
data.coins || 0;

}

});

/* UPDATE COINS */

async function changeCoins(amount){

const snapshot = await get(coinRef);

if(snapshot.exists()){

let current = snapshot.val().coins || 0;

current += amount;

if(current < 0){
current = 0;
}

await update(coinRef,{
coins:current
});

}

}

/* =========================
   BOT VARIABLES
========================= */

let ws;

let prices=[];

let wins=0;
let losses=0;
let total=0;

let lastSignal="WAIT";

let lock=false;

/* =========================
   RSI
========================= */

function RSI(data,period=14){

if(data.length<period+1)return 50;

let gains=0;
let lossesValue=0;

for(let i=data.length-period;i<data.length;i++){

let diff=data[i]-data[i-1];

if(diff>0){
gains+=diff;
}else{
lossesValue+=Math.abs(diff);
}

}

if(lossesValue===0)return 100;

let rs=(gains/period)/(lossesValue/period);

return 100-(100/(1+rs));

}

/* =========================
   EMA
========================= */

function EMA(data,period){

let k=2/(period+1);

let ema=data[0];

for(let i=1;i<data.length;i++){

ema=data[i]*k+ema*(1-k);

}

return ema;

}

/* =========================
   MACD
========================= */

function MACD(data){

let fast=EMA(data,12);

let slow=EMA(data,26);

return fast-slow;

}

/* =========================
   MOMENTUM
========================= */

function momentum(data){

if(data.length<10)return 0;

return data[data.length-1]-data[data.length-8];

}

/* =========================
   VOLATILITY
========================= */

function volatility(data){

if(data.length<15)return 0;

let recent=data.slice(-15);

let max=Math.max(...recent);

let min=Math.min(...recent);

return max-min;

}

/* =========================
   SIGNAL STRENGTH
========================= */

function trendStrength(
fastEMA,
slowEMA,
rsi,
macd,
mom
){

let score=0;

if(fastEMA>slowEMA){
score+=3;
}else{
score-=3;
}

if(rsi<35){
score+=2;
}

if(rsi>70){
score-=2;
}

if(macd>0){
score+=2;
}else{
score-=2;
}

if(mom>0){
score+=2;
}else{
score-=2;
}

return score;

}

/* =========================
   UPDATE CIRCLE
========================= */

function updateCircle(signal,duration){

let c=document.getElementById("circle");

c.className="circle hold";

if(signal==="BUY"){
c.className="circle buy";
}

if(signal==="SELL"){
c.className="circle sell";
}

c.innerHTML=`

<div>${signal}</div>

<div style="font-size:14px">
${duration}s EXP
</div>

`;

}

/* =========================
   START BOT
========================= */

window.start = function(){

prices=[];

if(ws){
ws.close();
}

ws = new WebSocket(
"wss://ws.derivws.com/websockets/v3?app_id=1089"
);

ws.onopen=()=>{

ws.send(JSON.stringify({

ticks:document.getElementById("pair").value,

subscribe:1

}));

};

ws.onmessage=async(msg)=>{

let data=JSON.parse(msg.data);

if(!data.tick)return;

let price=parseFloat(data.tick.quote);

if(isNaN(price))return;

prices.push(price);

if(prices.length>300){
prices.shift();
}

document.getElementById("price").innerText=price;

if(prices.length<35)return;

/* INDICATORS */

let rsi=RSI(prices);

let emaFast=EMA(prices,8);

let emaSlow=EMA(prices,25);

let macd=MACD(prices);

let mom=momentum(prices);

let vol=volatility(prices);

/* DISPLAY */

document.getElementById("rsi").innerText =
rsi.toFixed(2);

document.getElementById("emaFast").innerText =
emaFast.toFixed(5);

document.getElementById("emaSlow").innerText =
emaSlow.toFixed(5);

document.getElementById("macd").innerText =
macd.toFixed(5);

/* TREND */

let trend="SIDEWAYS";

if(emaFast>emaSlow){
trend="UPTREND";
}

if(emaFast<emaSlow){
trend="DOWNTREND";
}

document.getElementById("trend").innerText=trend;

/* SCORE */

let score = trendStrength(
emaFast,
emaSlow,
rsi,
macd,
mom
);

document.getElementById("strength").innerText=score;

/* SIGNAL */

let signal="WAIT";

let duration=60;

/* FILTER */

if(vol < 0.00010){

signal="WAIT";

}

/* STRONG BUY */

else if(

score >= 6 &&
emaFast > emaSlow &&
macd > 0 &&
rsi > 45 &&
mom > 0

){

signal="BUY";

duration=60;

}

/* STRONG SELL */

else if(

score <= -6 &&
emaFast < emaSlow &&
macd < 0 &&
rsi < 55 &&
mom < 0

){

signal="SELL";

duration=60;

}

/* LOCK */

if(lock)return;

if(signal!=="WAIT" && signal!==lastSignal){

/* CHECK COINS */

const snap = await get(coinRef);

let currentCoins = 0;

if(snap.exists()){
currentCoins = snap.val().coins || 0;
}

if(currentCoins <= 0){

alert("Insufficient Coins");

return;

}

/* TEMP DEDUCT */

await changeCoins(-1);

lastSignal=signal;

lock=true;

total++;

document.getElementById("total").innerText=total;

document.getElementById("sig").innerText=signal;

updateCircle(signal,duration);

/* CREATE TRADE */

let trade={

signal:signal,

entry:price,

start:Date.now(),

end:Date.now()+(duration*1000)

};

startCountdown(trade);

}

};

};

/* =========================
   COUNTDOWN
========================= */

function startCountdown(trade){

let timer=setInterval(()=>{

let left=Math.floor(
(trade.end-Date.now())/1000
);

if(left<=0){

clearInterval(timer);

document.getElementById("countdown").innerText="0s";

evaluateTrade(trade);

lastSignal="WAIT";

lock=false;

document.getElementById("sig").innerText=
"SEARCHING...";

updateCircle("WAIT","--");

return;

}

document.getElementById("countdown").innerText=
left+"s";

},1000);

}

/* =========================
   EVALUATE
========================= */

async function evaluateTrade(trade){

let current=prices[prices.length-1];

let win=false;

if(

(trade.signal==="BUY" && current>trade.entry)

||

(trade.signal==="SELL" && current<trade.entry)

){

win=true;

}

/* WIN */

if(win){

wins++;

document.getElementById("wins").innerText=wins;

document.getElementById("result").innerHTML=
"<span class='win'>GAIN ✅</span>";

/* RETURN COIN */

await changeCoins(1);

}

/* LOSS */

else{

losses++;

document.getElementById("losses").innerText=losses;

document.getElementById("result").innerHTML=
"<span class='loss'>LOSS ❌</span>";

}

/* ACCURACY */

let accuracy = 0;

if(total > 0){

accuracy = ((wins/total)*100).toFixed(1);

}

document.getElementById("accuracy").innerText =
accuracy + "%";

addHistory(trade,win,current);

}

/* =========================
   HISTORY
========================= */

function addHistory(trade,win,current){

let history=document.getElementById("history");

let item=document.createElement("div");

item.className="historyItem";

let badge = trade.signal==="BUY"

? "<span class='badge buyBadge'>BUY</span>"

: "<span class='badge sellBadge'>SELL</span>";

item.innerHTML=`

${badge}<br><br>

Entry:
${trade.entry}<br>

Close:
${current}<br>

Result:
${win

? "<span class='win'>GAIN ✅</span>"

: "<span class='loss'>LOSS ❌</span>"

}

`;

history.prepend(item);

}

</script>

</body>
</html>
