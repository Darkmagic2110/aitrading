<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DARK MAGIC AI PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:'Outfit',sans-serif;
background:radial-gradient(circle at top,#1a0b2e,#000);
color:#fff;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

/* FULL SCREEN APP */
.app{
width:100%;
height:100vh;
padding:18px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

/* HEADER */
h1{
text-align:center;
font-size:22px;
font-weight:800;
margin:0;
}

/* SELECT */
select{
width:100%;
padding:14px;
border-radius:14px;
border:none;
background:rgba(255,255,255,.06);
color:#fff;
margin-top:10px;
outline:none;
}

/* BUTTON */
button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
margin-top:12px;
font-weight:700;
background:linear-gradient(135deg,#ff006a,#7b61ff);
color:#fff;
cursor:pointer;
transition:.2s;
}
button:active{transform:scale(.98)}

/* MAIN CIRCLE */
.circle{
width:220px;
height:220px;
margin:18px auto;
border-radius:50%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:32px;
font-weight:800;
border:4px solid #444;
transition:.3s;
text-align:center;
}

.buy{color:#00ff84;border-color:#00ff84;box-shadow:0 0 30px #00ff84}
.sell{color:#ff3355;border-color:#ff3355;box-shadow:0 0 30px #ff3355}
.wait{color:#ffcc00}

/* PANELS */
.panel{
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.08);
padding:12px;
border-radius:14px;
margin-top:10px;
font-size:13px;
}

/* STATS */
.stats{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
margin-top:10px;
text-align:center;
}

.stats div{
background:rgba(255,255,255,.04);
padding:10px;
border-radius:12px;
}

.small{
opacity:.8;
font-size:12px;
}

</style>
</head>

<body>

<div class="app">

<h1>⚡ DARK MAGIC AI PRO</h1>

<select id="tf">
<option value="30">30 Sec</option>
<option value="60">1 Min</option>
<option value="90">1:30 Min</option>
<option value="120">2 Min</option>
<option value="150">2:30 Min</option>
<option value="180">3 Min</option>
</select>

<button onclick="start()">▶ START BOT</button>

<div id="circle" class="circle wait">
<div>WAIT</div>
<div class="small" id="cd">--</div>
</div>

<div class="panel">
Price: <span id="price">--</span><br>
Signal: <span id="sig">WAIT</span>
</div>

<div class="stats">
<div>Signals<br><b id="total">0</b></div>
<div>Wins<br><b id="wins">0</b></div>
<div>Loss<br><b id="loss">0</b></div>
</div>

</div>

<script>

let ws;
let prices=[];
let trade=null;

let total=0,wins=0,loss=0;

/* START */
function start(){

prices=[];
if(ws)ws.close();

ws=new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");

ws.onopen=()=>{
ws.send(JSON.stringify({ticks:"frxEURUSD",subscribe:1}));
};

ws.onmessage=(msg)=>{

let d=JSON.parse(msg.data);
if(!d.tick)return;

let price=parseFloat(d.tick.quote);
prices.push(price);
if(prices.length>100)prices.shift();

document.getElementById("price").innerText=price.toFixed(5);

/* ONLY ONE TRADE AT A TIME */
if(!trade && prices.length>20){
createTrade(price);
}

};

}

/* CREATE TRADE */
function createTrade(price){

let tf=parseInt(document.getElementById("tf").value);

let signal=Math.random()>0.5?"BUY":"SELL"; // stable placeholder logic

trade={
signal,
entry:price,
end:Date.now()+tf*1000
};

document.getElementById("sig").innerText=signal;
document.getElementById("total").innerText=++total;

updateCircle(signal);
startCountdown();
}

/* UI */
function updateCircle(sig){
let c=document.getElementById("circle");
c.className="circle wait";

if(sig==="BUY")c.className="circle buy";
if(sig==="SELL")c.className="circle sell";

c.innerHTML=`<div>${sig}</div><div class="small" id="cd">ACTIVE</div>`;
}

/* COUNTDOWN */
function startCountdown(){

let t=setInterval(()=>{

if(!trade)return;

let left=Math.floor((trade.end-Date.now())/1000);
document.getElementById("cd").innerText=left+"s";

if(left<=0){
clearInterval(t);
evaluate();
trade=null;
}

},1000);

}

/* EVALUATION */
function evaluate(){

let price=prices[prices.length-1];

let win=false;

if(trade.signal==="BUY" && price>=trade.entry)win=true;
if(trade.signal==="SELL" && price<=trade.entry)win=true;

if(win){
wins++;
document.getElementById("wins").innerText=wins;
}else{
loss++;
document.getElementById("loss").innerText=loss;
}

}

</script>

</body>
</html>
