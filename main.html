<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DARK MAGIC AI</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Outfit',sans-serif;
background:radial-gradient(circle at top,#1a0f2e,#000);
color:#fff;
padding:18px;
overflow-y:auto;
}

/* MENU */
#menuBtn{
position:fixed;
top:14px;
left:14px;
width:42px;
height:32px;
display:flex;
flex-direction:column;
justify-content:space-between;
cursor:pointer;
z-index:10000;
}
#menuBtn span{height:4px;background:#fff;border-radius:10px;}
#menuBox{
position:fixed;
top:60px;
left:14px;
background:rgba(20,20,20,.95);
border:1px solid rgba(255,255,255,.1);
border-radius:16px;
padding:10px;
display:none;
flex-direction:column;
gap:10px;
z-index:9999;
backdrop-filter:blur(10px);
}
#menuBox button{padding:10px;border:none;border-radius:10px;cursor:pointer;background:#222;color:#fff;}

/* BALANCE */
#balanceContainer{
position:fixed;
top:12px;
right:12px;
background:rgba(20,20,20,.95);
padding:8px 14px;
border-radius:20px;
display:flex;
align-items:center;
gap:8px;
z-index:9999;
border:1px solid rgba(255,215,0,.25);
box-shadow:0 0 18px rgba(255,215,0,.25);
backdrop-filter:blur(10px);
}
#coinEmoji{font-size:20px;}
#balanceAmount{font-size:15px;font-weight:700;color:#ffd700;}
#dmText{font-size:13px;color:#fff;opacity:.9;}
#addBalanceBtn{width:28px;height:28px;border-radius:50%;border:none;background:linear-gradient(135deg,#ffd700,#ff9900);color:#000;font-size:18px;font-weight:800;cursor:pointer;}

/* KEY BOX */
#keyBox{
max-width:460px;
margin:80px auto 10px;
background:rgba(255,255,255,.04);
padding:12px;
border-radius:14px;
border:1px solid rgba(255,255,255,.1);
}
#keyInput{width:100%;padding:12px;border-radius:10px;border:none;outline:none;margin-bottom:8px;}
#keyStatus{font-size:12px;color:#aaa}

/* MAIN */
.container{
max-width:460px;
margin:auto;
margin-top:20px;
background:rgba(20,20,20,.85);
border-radius:24px;
padding:20px;
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(10px);
}
h1{text-align:center;font-size:26px;font-weight:800;background:linear-gradient(90deg,#fff,#aaa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sub{text-align:center;font-size:13px;color:#aaa;margin-top:8px;}

select,button{
width:100%;margin-top:12px;padding:14px;border-radius:16px;border:none;outline:none;font-family:'Outfit',sans-serif;
}
select{background:rgba(255,255,255,.05);color:#fff;border:1px solid rgba(255,255,255,.1);}
button{background:linear-gradient(135deg,#ff006a,#7b61ff);color:#fff;font-weight:700;cursor:pointer;font-size:15px;}

.circle{width:220px;height:220px;margin:20px auto;border-radius:50%;display:flex;flex-direction:column;justify-content:center;align-items:center;font-size:38px;font-weight:800;border:4px solid #444;text-align:center;transition:.4s;}
.buy{color:#00ff84;border-color:#00ff84;box-shadow:0 0 50px #00ff84;}
.sell{color:#ff3355;border-color:#ff3355;box-shadow:0 0 50px #ff3355;}
.hold{color:#ffcc00;border-color:#ffcc00;box-shadow:0 0 35px #ffcc00;}

.box,.signalBox,.history{margin-top:14px;background:rgba(255,255,255,.03);padding:14px;border-radius:16px;border:1px solid rgba(255,255,255,.06);font-size:13px;}

.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:14px;}
.card{background:rgba(255,255,255,.03);padding:12px;border-radius:16px;text-align:center;border:1px solid rgba(255,255,255,.06);}
.card h2{margin:6px 0 0;font-size:24px;}
.win{color:#00ff84;}
.loss{color:#ff3355;}

.historyItem{padding:10px;border-bottom:1px solid rgba(255,255,255,.06);font-size:12px;}
.badge{padding:4px 8px;border-radius:8px;font-size:11px;font-weight:700;}
.buyBadge{background:#003d22;color:#00ff84;}
.sellBadge{background:#3d0012;color:#ff3355;}

</style>
</head>

<body>

<!-- MENU -->
<div id="menuBtn" onclick="toggleMenu()">
<span></span><span></span><span></span>
</div>

<div id="menuBox">
<button onclick="window.location.href='key.html'">Get Key</button>
<button onclick="window.location.href='help.html'">Help</button>
</div>

<!-- BALANCE -->
<div id="balanceContainer">
<span id="coinEmoji">🪙</span>
<span id="balanceAmount">0</span>
<span id="dmText">DM COINS</span>
<button id="addBalanceBtn">+</button>
</div>

<!-- KEY -->
<div id="keyBox">
<input id="keyInput" placeholder="Enter Access Key">
<div id="keyStatus">Key required</div>
</div>

<div class="container">

<h1>⚡ DARK MAGIC AI</h1>
<p class="sub">Continuous Trend Signal Engine 📊</p>

<select id="pair">
<option value="frxEURUSD">EUR/USD</option>
<option value="frxGBPUSD">GBP/USD</option>
<option value="frxUSDJPY">USD/JPY</option>
<option value="frxAUDUSD">AUD/USD</option>
<option value="frxEURJPY">EUR/JPY</option>
<option value="frxUSDCHF">USD/CHF</option>
</select>

<button onclick="start()">▶ START BOT</button>

<div id="circle" class="circle hold">
<div>WAIT</div><div style="font-size:14px">EXP: --</div>
</div>

<div class="box">
<p>💰 Price: <span id="price">--</span></p>
</div>

<div class="signalBox">
<p>📡 Signal: <span id="sig">WAIT</span></p>
<p>⏳ Countdown: <span id="countdown">--</span></p>
<p>🔑 Key Time: <span id="keyTime">--</span></p>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyDvFDByPPo9zgwKLdPaREz1OVMQCXmPfrs",
authDomain:"bets-d795d.firebaseapp.com",
databaseURL:"https://bets-d795d-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let userEmail="";
let ws,prices=[],lock=false,last="WAIT";
let keyActive=false;
let keyExpires=0;
let keyTimer=null;

/* AUTH */
firebase.auth().onAuthStateChanged(u=>{
if(!u){location.href="login.html";return;}
userEmail=u.email;
db.ref("users/"+u.uid+"/balance").on("value",s=>{
document.getElementById("balanceAmount").innerText=Math.floor(s.val()||0);
});
});

/* FORMAT TIME */
function fmt(ms){
let s=Math.max(0,Math.floor(ms/1000));
let h=Math.floor(s/3600);
let m=Math.floor((s%3600)/60);
let sec=s%60;
return String(h).padStart(2,'0')+":"+String(m).padStart(2,'0')+":"+String(sec).padStart(2,'0');
}

/* KEY VALIDATION */
function validateKey(key){
return db.ref("keys/"+key).once("value").then(snap=>{
let d=snap.val();
if(!d) return false;
if(d.email!==userEmail) return false;
if(Date.now()>d.expires) return false;
keyExpires=d.expires;
keyActive=true;
startKeyCountdown();
return true;
});
}

/* KEY COUNTDOWN */
function startKeyCountdown(){
if(keyTimer)clearInterval(keyTimer);
keyTimer=setInterval(()=>{
let left=keyExpires-Date.now();
document.getElementById("keyTime").innerText=fmt(left);
if(left<=0){
clearInterval(keyTimer);
keyActive=false;
stopBot();
document.getElementById("keyStatus").innerText="Key expired";
}
},1000);
}

/* START BOT */
function start(){
let key=document.getElementById("keyInput").value.trim();
if(!key){alert("Enter key");return;}

validateKey(key).then(ok=>{
if(!ok){
document.getElementById("keyStatus").innerText="Invalid or expired key";
return;
}

document.getElementById("keyStatus").innerText="Key active";

if(ws)ws.close();
prices=[];
ws=new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");

ws.onopen=()=>{
ws.send(JSON.stringify({ticks:document.getElementById("pair").value,subscribe:1}));
};

ws.onmessage=(msg)=>{
if(!keyActive)return;

let d=JSON.parse(msg.data);
if(!d.tick)return;
let price=parseFloat(d.tick.quote);

prices.push(price);
if(prices.length>200)prices.shift();

document.getElementById("price").innerText=price;

if(prices.length<20)return;

let emaFast=price;
let emaSlow=price;

let signal="WAIT";
if(emaFast>emaSlow)signal="BUY";
else if(emaFast<emaSlow)signal="SELL";

if(!lock&&signal!==last){
last=signal;
lock=true;
startTradeCountdown();
}
};
});
}

/* STOP */
function stopBot(){
if(ws)ws.close();
ws=null;
}

/* TRADE COUNTDOWN */
function startTradeCountdown(){
let t=300;
let x=setInterval(()=>{
document.getElementById("countdown").innerText=fmt(t*1000);
t--;
if(t<=0){
clearInterval(x);
lock=false;
}
},1000);
}

function toggleMenu(){
let m=document.getElementById("menuBox");
m.style.display=m.style.display==="flex"?"none":"flex";
}

</script>

</body>
</html>
