<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DARK MAGIC TIME AI</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Outfit',sans-serif;
background:radial-gradient(circle,#1a0b2e,#000);
color:#fff;
padding:16px;
}

.container{
max-width:460px;
margin:auto;
background:rgba(20,20,20,.85);
padding:18px;
border-radius:20px;
border:1px solid rgba(255,255,255,.08);
}

h1{text-align:center}

select,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:12px;
border:none;
font-family:'Outfit',sans-serif;
}

select{background:#111;color:#fff}

button{
background:linear-gradient(135deg,#ff006a,#7b61ff);
color:#fff;
font-weight:700;
}

.circle{
width:180px;
height:180px;
margin:16px auto;
border-radius:50%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:28px;
font-weight:800;
border:4px solid #444;
}

.buy{color:#00ff84;border-color:#00ff84}
.sell{color:#ff3355;border-color:#ff3355}
.wait{color:#ffcc00}

.stats{
display:grid;
grid-template-columns:1fr 1fr 1fr;
text-align:center;
margin-top:12px;
gap:8px;
}

.box{
margin-top:12px;
background:rgba(255,255,255,.04);
padding:10px;
border-radius:12px;
font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<h1>⚡ TIMEFRAME AI BOT</h1>

<select id="timeframe">
<option value="30">30 sec</option>
<option value="60">1 min</option>
<option value="90">1:30 min</option>
<option value="120">2 min</option>
<option value="150">2:30 min</option>
<option value="180">3 min</option>
</select>

<button onclick="start()">START BOT</button>

<div id="circle" class="circle wait">
<div>WAIT</div>
<div id="cd" style="font-size:13px">--</div>
</div>

<div class="box">
<p>Price: <span id="price">--</span></p>
<p>Signal: <span id="signal">--</span></p>
</div>

<div class="stats">
<div>Signals<br><b id="total">0</b></div>
<div>Wins<br><b id="wins">0</b></div>
<div>Loss<br><b id="loss">0</b></div>
</div>

</div>

<script>

let ws;
let prices=[];
let trades=[];

let total=0,wins=0,loss=0;
let currentTrade=null;

/* START */
function start(){

prices=[];
if(ws)ws.close();

ws=new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");

ws.onopen=()=>{
ws.send(JSON.stringify({
ticks:"frxEURUSD",
subscribe:1
}));
};

ws.onmessage=(msg)=>{

let d=JSON.parse(msg.data);
if(!d.tick)return;

let price=parseFloat(d.tick.quote);
prices.push(price);
if(prices.length>100)prices.shift();

document.getElementById("price").innerText=price.toFixed(5);

/* CREATE SIGNAL ONLY IF NO ACTIVE TRADE */
if(!currentTrade && prices.length>20){
generateSignal(price);
}

};

}

/* SIGNAL */
function generateSignal(price){

let direction=Math.random()>0.5?"BUY":"SELL"; // simplified stable logic (can upgrade later)

let tf=parseInt(document.getElementById("timeframe").value);

currentTrade={
signal:direction,
entry:price,
time:Date.now(),
expiry:Date.now()+tf*1000
};

document.getElementById("signal").innerText=direction;
document.getElementById("total").innerText=++total;

updateCircle(direction);

startEvaluation();
}

/* UI */
function updateCircle(sig){
let c=document.getElementById("circle");
c.className="circle wait";

if(sig==="BUY")c.className="circle buy";
if(sig==="SELL")c.className="circle sell";

c.innerHTML=`<div>${sig}</div><div id="cd">ACTIVE TRADE</div>`;
}

/* EVALUATION LOOP */
function startEvaluation(){

let timer=setInterval(()=>{

if(!currentTrade)return;

let now=Date.now();
let left=Math.floor((currentTrade.expiry-now)/1000);

document.getElementById("cd").innerText=left+"s";

if(now>=currentTrade.expiry){

clearInterval(timer);
evaluateTrade();
currentTrade=null;

}

},1000);

}

/* RESULT CHECK */
function evaluateTrade(){

let price=prices[prices.length-1];

let win=false;

if(currentTrade.signal==="BUY" && price>=currentTrade.entry){
win=true;
}

if(currentTrade.signal==="SELL" && price<=currentTrade.entry){
win=true;
}

if(win){
wins++;
document.getElementById("wins").innerText=wins;
}else{
loss++;
document.getElementById("loss").innerText=loss;
}

}

</script>

</body>
</html>
