<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DARK MAGIC AI</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Outfit',sans-serif;background:radial-gradient(circle at top,#1a0f2e,#000);color:#fff;padding:18px;overflow-y:auto}

/* BALANCE */
#balanceContainer{position:fixed;top:12px;right:12px;background:rgba(20,20,20,.95);padding:8px 14px;border-radius:20px;display:flex;align-items:center;gap:8px;z-index:9999;border:1px solid rgba(255,215,0,.25);box-shadow:0 0 18px rgba(255,215,0,.25);backdrop-filter:blur(10px)}
#coinEmoji{font-size:20px}#balanceAmount{font-size:15px;font-weight:700;color:#ffd700}#dmText{font-size:13px;color:#fff;opacity:.9}
#addBalanceBtn{width:28px;height:28px;border-radius:50%;border:none;background:linear-gradient(135deg,#ffd700,#ff9900);color:#000;font-size:18px;font-weight:800;cursor:pointer}

/* MENU */
#menuBtn{position:fixed;top:18px;left:18px;width:40px;cursor:pointer;z-index:9999}
.bar{height:4px;background:#fff;margin:6px 0;border-radius:4px}
#menu{position:fixed;top:65px;left:18px;background:#111;padding:10px;border-radius:12px;display:none;flex-direction:column;gap:10px;z-index:9999}
#menu button{padding:10px;border:none;border-radius:8px;background:#222;color:#fff}

/* KEY */
#keyBox{max-width:460px;margin:10px auto;background:rgba(255,255,255,.05);padding:10px;border-radius:12px}
#keyInput{width:100%;padding:10px;border-radius:10px;border:none;margin-top:5px}
#keyStatus{font-size:12px;margin-top:5px;color:#ffcc00}

.container{max-width:460px;margin:auto;margin-top:60px;background:rgba(20,20,20,.85);border-radius:24px;padding:20px}
h1{text-align:center;font-size:26px;font-weight:800}
.sub{text-align:center;font-size:13px;color:#aaa}

select,button{width:100%;margin-top:12px;padding:14px;border-radius:16px;border:none}
button{background:linear-gradient(135deg,#ff006a,#7b61ff);color:#fff;font-weight:700}

/* CIRCLE */
.circle{width:220px;height:220px;margin:20px auto;border-radius:50%;display:flex;flex-direction:column;justify-content:center;align-items:center;font-size:38px;font-weight:800;border:4px solid #444}
.buy{color:#00ff84;border-color:#00ff84}.sell{color:#ff3355;border-color:#ff3355}.hold{color:#ffcc00;border-color:#ffcc00}

/* BOX */
.box,.signalBox,.history{margin-top:14px;background:rgba(255,255,255,.03);padding:14px;border-radius:16px}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:14px}
.card{background:rgba(255,255,255,.03);padding:12px;border-radius:16px;text-align:center}
.win{color:#00ff84}.loss{color:#ff3355}

.historyItem{padding:10px;border-bottom:1px solid rgba(255,255,255,.06);font-size:12px}
.badge{padding:4px 8px;border-radius:8px;font-size:11px}
.buyBadge{background:#003d22;color:#00ff84}
.sellBadge{background:#3d0012;color:#ff3355}
</style></head>

<body>

<!-- MENU -->
<div id="menuBtn" onclick="toggleMenu()">
<div class="bar"></div><div class="bar"></div><div class="bar"></div>
</div>

<div id="menu">
<button onclick="randomTG()">Customer Support</button>
<button onclick="location.href='key.html'">Get Key</button>
<button onclick="location.href='help.html'">Help</button>
</div>

<!-- BALANCE -->
<div id="balanceContainer">
<span id="coinEmoji">🪙</span>
<span id="balanceAmount">0</span>
<span id="dmText">DM COINS</span>
<button id="addBalanceBtn">+</button>
</div>

<!-- KEY -->
<div id="keyBox">
Key:<input id="keyInput" placeholder="Enter key">
<button onclick="setKey()">Activate Key</button>
<div id="keyStatus">Key required</div>
<div id="keyCountdown"></div>
</div>

<div class="container">

<h1>DARK MAGIC AI</h1>
<p class="sub">Signal Engine</p>

<select id="pair">
<option value="frxEURUSD">EUR/USD</option>
<option value="frxGBPUSD">GBP/USD</option>
<option value="frxUSDJPY">USD/JPY</option>
</select>

<button onclick="start()">START BOT</button>

<div id="circle" class="circle hold">
<div>WAIT</div><div style="font-size:14px">EXP --</div>
</div>

<div class="box">
<p>Price: <span id="price">--</span></p>
<p>RSI: <span id="rsi">--</span></p>
<p>EMA FAST: <span id="emaFast">--</span></p>
<p>EMA SLOW: <span id="emaSlow">--</span></p>
<p>MACD: <span id="macd">--</span></p>
<p>Trend: <span id="trend">--</span></p>
</div>

<div class="signalBox">
<p>Signal: <span id="sig">WAIT</span></p>
<p>Countdown: <span id="countdown">--</span></p>
</div>

</div>

<script>

/* MENU */
function toggleMenu(){
let m=document.getElementById("menu");
m.style.display=m.style.display==="flex"?"none":"flex";
}
function randomTG(){
let a=["https://t.me/dark_maggik","https://t.me/dark_magiks"];
location.href=a[Math.floor(Math.random()*a.length)];
}

/* KEY SYSTEM */
let keyActive=false,keyExp=0,timer;

function setKey(){
let k=document.getElementById("keyInput").value;
if(!k)return alert("Enter key");

keyActive=true;
keyExp=Date.now()+600000; //10 min demo
localStorage.setItem("k",k);
localStorage.setItem("e",keyExp);

document.getElementById("keyStatus").innerText="ACTIVE";
runKeyTimer();
}

function runKeyTimer(){
clearInterval(timer);
timer=setInterval(()=>{
let left=Math.floor((keyExp-Date.now())/1000);
if(left<=0){
keyActive=false;
document.getElementById("keyStatus").innerText="EXPIRED";
stopBot();
return;
}
document.getElementById("keyCountdown").innerText="Key: "+left+"s";
},1000);
}

function stopBot(){
if(ws)ws.close();
lock=true;
}

/* restore key */
if(localStorage.getItem("e") && Date.now()<localStorage.getItem("e")){
keyActive=true;
keyExp=parseInt(localStorage.getItem("e"));
runKeyTimer();
}

/* BALANCE (optional) */
document.getElementById("addBalanceBtn").onclick=()=>location.href="deposit.html";

/* BOT */
let ws,prices=[],lock=false,last="WAIT";

function start(){
if(!keyActive)return alert("Activate key first");

prices=[];
if(ws)ws.close();

ws=new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");

ws.onopen=()=>{
ws.send(JSON.stringify({ticks:document.getElementById("pair").value,subscribe:1}));
};

ws.onmessage=(msg)=>{
if(!keyActive){stopBot();return;}

let d=JSON.parse(msg.data);
if(!d.tick)return;

let p=parseFloat(d.tick.quote);
prices.push(p);
if(prices.length>200)prices.shift();

document.getElementById("price").innerText=p;

if(prices.length<20)return;

let emaFast=p,emaSlow=p,signal="WAIT";

if(emaFast>emaSlow)signal="BUY";
if(emaFast<emaSlow)signal="SELL";

if(lock)return;

if(signal!==last){
last=signal;
lock=true;
document.getElementById("sig").innerText=signal;
}
};
}

</script>

</body></html>
