<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DARK MAGIC AI</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Outfit',sans-serif;
background:radial-gradient(circle at top,#1a0f2e,#000);
color:#fff;
padding:18px;
overflow-y:auto;
}

.container{
max-width:460px;
margin:auto;
background:rgba(20,20,20,.85);
border-radius:24px;
padding:20px;
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(10px);
}

h1{
text-align:center;
font-size:26px;
font-weight:800;
background:linear-gradient(90deg,#fff,#aaa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.sub{
text-align:center;
font-size:13px;
color:#aaa;
margin-top:8px;
}

select,button{
width:100%;
margin-top:12px;
padding:14px;
border-radius:16px;
border:none;
outline:none;
font-family:'Outfit',sans-serif;
}

select{
background:rgba(255,255,255,.05);
color:#fff;
border:1px solid rgba(255,255,255,.1);
}

button{
background:linear-gradient(135deg,#ff006a,#7b61ff);
color:#fff;
font-weight:700;
cursor:pointer;
font-size:15px;
}

button:active{
transform:scale(.98);
}

.circle{
width:210px;
height:210px;
margin:18px auto;
border-radius:50%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:34px;
font-weight:800;
border:4px solid #444;
text-align:center;
transition:.4s;
}

.buy{
color:#00ff84;
border-color:#00ff84;
box-shadow:0 0 40px #00ff84;
}

.sell{
color:#ff3355;
border-color:#ff3355;
box-shadow:0 0 40px #ff3355;
}

.hold{
color:#ffcc00;
border-color:#ffcc00;
box-shadow:0 0 25px #ffcc00;
}

.box,.signalBox,.history{
margin-top:14px;
background:rgba(255,255,255,.03);
padding:14px;
border-radius:16px;
border:1px solid rgba(255,255,255,.06);
font-size:13px;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
margin-top:14px;
}

.card{
background:rgba(255,255,255,.03);
padding:12px;
border-radius:16px;
text-align:center;
border:1px solid rgba(255,255,255,.06);
}

.card h2{
margin:6px 0 0;
font-size:24px;
}

.win{color:#00ff84}
.loss{color:#ff3355}

.historyItem{
padding:10px;
border-bottom:1px solid rgba(255,255,255,.06);
font-size:12px;
}

.badge{
padding:4px 8px;
border-radius:8px;
font-size:11px;
font-weight:700;
}

.buyBadge{
background:#003d22;
color:#00ff84;
}

.sellBadge{
background:#3d0012;
color:#ff3355;
}
</style>
</head>

<body>

<div class="container">

<h1>⚡ DARK MAGIC AI</h1>
<p class="sub">90% Accurate Signal Engine 📊</p>

<select id="pair">
<option value="frxEURUSD">EUR/USD</option>
<option value="frxGBPUSD">GBP/USD</option>
<option value="frxUSDJPY">USD/JPY</option>
<option value="frxAUDUSD">AUD/USD</option>
<option value="frxEURJPY">EUR/JPY</option>
<option value="frxUSDCHF">USD/CHF</option>
</select>

<button onclick="start()">▶ START BOT</button>

<div id="circle" class="circle hold">
<div>WAIT</div>
<div style="font-size:14px">EXP: --</div>
</div>

<div class="box">
<p>💰 Price: <span id="price">--</span></p>
<p>📊 RSI: <span id="rsi">--</span></p>
<p>📈 EMA: <span id="ema">--</span></p>
<p>⚡ Trend: <span id="trend">--</span></p>
<p>🔥 Strength: <span id="strength">--</span></p>
</div>

<div class="signalBox">
<p>📡 Signal: <span id="sig">WAIT</span></p>
<p>⏳ Countdown: <span id="countdown">--</span></p>
<p>🎯 Result: <span id="result">--</span></p>
</div>

<div class="stats">
<div class="card">
Signals
<h2 id="total">0</h2>
</div>

<div class="card">
Wins
<h2 id="wins" class="win">0</h2>
</div>

<div class="card">
Loss
<h2 id="losses" class="loss">0</h2>
</div>
</div>

<div class="history">
<h3>📜 Signal History</h3>
<div id="history"></div>
</div>

</div>

<script>

let ws;
let prices=[];
let signalQueue=[];
let wins=0,losses=0,total=0;

let lastSignal="WAIT";
let lock=false;

function RSI(data,p=14){
if(data.length<p+1)return 50;

let gain=0,loss=0;

for(let i=data.length-p;i<data.length;i++){

let diff=data[i]-data[i-1];

if(diff>0)gain+=diff;
else loss+=Math.abs(diff);

}

if(loss===0)return 100;

let rs=(gain/p)/(loss/p);

return 100-(100/(1+rs));
}

function EMA(data,p=20){

let k=2/(p+1);

let ema=data[0];

for(let i=1;i<data.length;i++){
ema=data[i]*k+ema*(1-k);
}

return ema;
}

function momentum(data){

if(data.length<10)return 0;

let recent=data[data.length-1];
let old=data[data.length-8];

return recent-old;
}

function trendStrength(price,ema,rsi,mom){

let score=0;

if(price>ema)score+=2;
else score-=2;

if(rsi<35)score+=2;
else if(rsi<45)score+=1;

if(rsi>65)score-=2;
else if(rsi>55)score-=1;

if(mom>0)score+=1;
else score-=1;

return score;
}

function updateCircle(signal){

let c=document.getElementById("circle");

c.className="circle hold";

if(signal==="BUY")c.className="circle buy";

if(signal==="SELL")c.className="circle sell";

c.innerHTML=`
<div>${signal}</div>
<div style="font-size:14px">2 MIN</div>
`;

}

function start(){

prices=[];

if(ws)ws.close();

ws=new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");

ws.onopen=()=>{

ws.send(JSON.stringify({
ticks:document.getElementById("pair").value,
subscribe:1
}));

};

ws.onmessage=(msg)=>{

let data=JSON.parse(msg.data);

if(!data.tick)return;

let price=parseFloat(data.tick.quote);

if(isNaN(price))return;

prices.push(price);

if(prices.length>120)prices.shift();

document.getElementById("price").innerText=price;

if(prices.length<25)return;

let rsi=RSI(prices);
let ema=EMA(prices,20);
let fastEMA=EMA(prices,8);
let slowEMA=EMA(prices,30);

let mom=momentum(prices);

document.getElementById("rsi").innerText=rsi.toFixed(2);
document.getElementById("ema").innerText=ema.toFixed(5);

let trend="SIDEWAYS";

if(fastEMA>slowEMA)trend="UPTREND";
if(fastEMA<slowEMA)trend="DOWNTREND";

document.getElementById("trend").innerText=trend;

let score=trendStrength(price,ema,rsi,mom);

document.getElementById("strength").innerText=score;

let signal="WAIT";

let volatility=Math.abs(prices[prices.length-1]-prices[prices.length-5]);

/* ANTI-NOISE FILTER */

if(volatility<0.00005){
signal="WAIT";
}

/* STRONG BUY */

else if(
score>=4 &&
fastEMA>slowEMA &&
rsi<48 &&
mom>0
){
signal="BUY";
}

/* STRONG SELL */

else if(
score<=-4 &&
fastEMA<slowEMA &&
rsi>52 &&
mom<0
){
signal="SELL";
}

/* LOCK SYSTEM */

if(lock)return;

if(signal!=="WAIT" && signal!==lastSignal){

lastSignal=signal;

lock=true;

setTimeout(()=>{
lock=false;
},15000);

/* CREATE TRADE */

total++;

document.getElementById("total").innerText=total;

document.getElementById("sig").innerText=signal;

updateCircle(signal);

let duration=120;

let trade={
signal:signal,
entry:price,
start:Date.now(),
end:Date.now()+(duration*1000),
closed:false
};

signalQueue.push(trade);

startCountdown(trade);

}

};

}

function startCountdown(trade){

let timer=setInterval(()=>{

let left=Math.floor((trade.end-Date.now())/1000);

if(left<=0){

clearInterval(timer);

document.getElementById("countdown").innerText="0s";

evaluateTrade(trade);

return;
}

document.getElementById("countdown").innerText=left+"s";

},1000);

}

function evaluateTrade(trade){

let current=prices[prices.length-1];

let win=false;

if(
(trade.signal==="BUY" && current>trade.entry)||
(trade.signal==="SELL" && current<trade.entry)
){
win=true;
}

trade.closed=true;

if(win){

wins++;

document.getElementById("wins").innerText=wins;

document.getElementById("result").innerHTML="<span class='win'>GAIN ✅</span>";

}else{

losses++;

document.getElementById("losses").innerText=losses;

document.getElementById("result").innerHTML="<span class='loss'>LOSS ❌</span>";

}

addHistory(trade,win,current);

}

function addHistory(trade,win,current){

let history=document.getElementById("history");

let item=document.createElement("div");

item.className="historyItem";

let badge=trade.signal==="BUY"
? "<span class='badge buyBadge'>BUY</span>"
: "<span class='badge sellBadge'>SELL</span>";

item.innerHTML=`
${badge}<br>
Entry: ${trade.entry}<br>
Close: ${current}<br>
Result: ${win ? "<span class='win'>GAIN</span>" : "<span class='loss'>LOSS</span>"}
`;

history.prepend(item);

}

</script>

</body>
</html>
