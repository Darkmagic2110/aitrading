<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DARK MAGIC AI - FIXED OTC</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Outfit',sans-serif;
background:radial-gradient(circle at top,#1a0f2e,#000);
color:#fff;
padding:18px;
}

.container{
max-width:460px;
margin:auto;
background:rgba(20,20,20,.85);
border-radius:24px;
padding:20px;
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(10px);
}

h1{
text-align:center;
font-size:26px;
font-weight:800;
background:linear-gradient(90deg,#fff,#aaa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

select,button{
width:100%;
margin-top:12px;
padding:14px;
border-radius:16px;
border:none;
font-family:'Outfit',sans-serif;
}

select{
background:rgba(255,255,255,.05);
color:#fff;
border:1px solid rgba(255,255,255,.1);
}

button{
background:linear-gradient(135deg,#ff006a,#7b61ff);
color:#fff;
font-weight:700;
cursor:pointer;
}

.circle{
width:220px;
height:220px;
margin:20px auto;
border-radius:50%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:40px;
font-weight:800;
border:4px solid #444;
transition:.3s;
}

.buy{color:#00ff84;border-color:#00ff84;box-shadow:0 0 40px #00ff84;}
.sell{color:#ff3355;border-color:#ff3355;box-shadow:0 0 40px #ff3355;}
.hold{color:#ffcc00;border-color:#ffcc00;}

.box{
margin-top:14px;
background:rgba(255,255,255,.03);
padding:14px;
border-radius:16px;
border:1px solid rgba(255,255,255,.06);
font-size:13px;
}

</style>
</head>

<body>

<div class="container">

<h1>⚡ DARK MAGIC AI OTC</h1>

<select id="pair">
<option value="EURUSD">EUR/USD OTC</option>
<option value="GBPUSD">GBP/USD OTC</option>
<option value="USDJPY">USD/JPY OTC</option>
</select>

<button onclick="start()">▶ START BOT</button>

<div id="circle" class="circle hold">
<div>WAIT</div>
<div style="font-size:14px">READY</div>
</div>

<div class="box">
<p>Price: <span id="price">--</span></p>
<p>RSI: <span id="rsi">--</span></p>
<p>EMA FAST: <span id="emaFast">--</span></p>
<p>EMA SLOW: <span id="emaSlow">--</span></p>
<p>Signal: <span id="sig">WAIT</span></p>
</div>

</div>

<script>

let interval;
let prices=[];
let basePrices={
EURUSD:1.1000,
GBPUSD:1.2500,
USDJPY:150.00
};

let base=1.1000;

/* ======================
   PRICE SIMULATION
====================== */

function generatePrice(){

let move=(Math.random()-0.5)*0.0012;
move += (Math.random()-0.5)*0.0005;

base += move;

prices.push(base);

if(prices.length>200)prices.shift();

}

/* ======================
   EMA
====================== */

function EMA(data,p){
let k=2/(p+1);
let e=data[0];
for(let i=1;i<data.length;i++){
e=data[i]*k+e*(1-k);
}
return e;
}

/* ======================
   RSI
====================== */

function RSI(data){

if(data.length<15)return 50;

let g=0,l=0;

for(let i=data.length-14;i<data.length;i++){
let d=data[i]-data[i-1];
if(d>0)g+=d;
else l+=Math.abs(d);
}

let rs=g/(l||1);

return 100-(100/(1+rs));

}

/* ======================
   SIGNAL ENGINE
====================== */

function analyze(){

let emaFast=EMA(prices,8);
let emaSlow=EMA(prices,21);
let rsi=RSI(prices);

let signal="WAIT";

if(emaFast>emaSlow && rsi>55)signal="BUY";
else if(emaFast<emaSlow && rsi<45)signal="SELL";

return {signal,emaFast,emaSlow,rsi};

}

/* ======================
   UI UPDATE
====================== */

function updateCircle(sig){

let c=document.getElementById("circle");

c.className="circle hold";

if(sig==="BUY")c.className="circle buy";
if(sig==="SELL")c.className="circle sell";

c.innerHTML=`<div>${sig}</div><div style="font-size:14px">OTC ACTIVE</div>`;

}

/* ======================
   START BUTTON FIXED
====================== */

function start(){

// stop old loop if exists
if(interval)clearInterval(interval);

prices=[];

let pair=document.getElementById("pair").value;

// set base price per pair
base=basePrices[pair];

document.getElementById("sig").innerText="RUNNING...";

interval=setInterval(()=>{

generatePrice();

if(prices.length<20)return;

let r=analyze();

document.getElementById("price").innerText=base.toFixed(5);
document.getElementById("rsi").innerText=r.rsi.toFixed(2);
document.getElementById("emaFast").innerText=r.emaFast.toFixed(5);
document.getElementById("emaSlow").innerText=r.emaSlow.toFixed(5);
document.getElementById("sig").innerText=r.signal;

updateCircle(r.signal);

},1000);

}

</script>

</body>
</html>
