<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DARK MAGIC AI</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:'Outfit',sans-serif;
background:radial-gradient(circle at top,#1a0f2e,#000);
color:#fff;
min-height:100vh;
padding:20px;
overflow-y:auto
}
.container{
width:100%;
max-width:460px;
margin:auto;
background:rgba(18,18,18,.85);
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(18px);
border-radius:28px;
padding:22px;
box-shadow:0 0 40px rgba(255,0,106,.15)
}
h1{
text-align:center;
font-size:28px;
font-weight:800;
background:linear-gradient(90deg,#fff,#bbb);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent
}
.sub{
text-align:center;
font-size:13px;
color:#aaa;
margin-top:10px;
line-height:1.6
}
select{
width:100%;
margin-top:18px;
padding:16px;
border:none;
outline:none;
border-radius:18px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.08);
color:#fff;
font-family:'Outfit',sans-serif
}
button{
width:100%;
margin-top:16px;
padding:17px;
border:none;
border-radius:18px;
font-weight:700;
font-size:15px;
cursor:pointer;
color:#fff;
background:linear-gradient(135deg,#ff006a,#7b61ff);
box-shadow:0 0 30px rgba(255,0,106,.25);
transition:.2s
}
button:active{transform:scale(.98)}
.circle{
width:210px;
height:210px;
margin:22px auto;
border-radius:50%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:34px;
font-weight:800;
border:4px solid #444;
transition:.4s;
text-align:center
}
.buy{
color:#00ff84;
border-color:#00ff84;
box-shadow:0 0 35px #00ff84
}
.sell{
color:#ff2b52;
border-color:#ff2b52;
box-shadow:0 0 35px #ff2b52
}
.hold{
color:#ffcc00;
border-color:#ffcc00;
box-shadow:0 0 35px #ffcc00
}
.box{
margin-top:14px;
background:rgba(255,255,255,.03);
border:1px solid rgba(255,255,255,.06);
padding:16px;
border-radius:18px;
font-size:14px
}
.box p{
margin-top:8px
}
.stats{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
margin-top:16px
}
.card{
background:rgba(255,255,255,.03);
padding:14px;
border-radius:16px;
text-align:center;
border:1px solid rgba(255,255,255,.06)
}
.card h3{
font-size:22px;
margin-top:6px
}
.signalBox{
margin-top:16px;
background:rgba(255,255,255,.03);
padding:16px;
border-radius:18px;
border:1px solid rgba(255,255,255,.06)
}
.signalBox p{
margin-top:8px;
font-size:14px
}
.win{color:#00ff84}
.loss{color:#ff2b52}
</style>
</head>
<body>

<div class="container">

<h1>⚡ DARK MAGIC AI</h1>

<p class="sub">
90% Accurate AI Signal Analysis • Real-Time Candle Detection 📈
</p>

<select id="pair">
<option value="frxEURUSD">EUR/USD</option>
<option value="frxGBPUSD">GBP/USD</option>
<option value="frxUSDJPY">USD/JPY</option>
<option value="frxAUDUSD">AUD/USD</option>
</select>

<button onclick="start()">▶ START BOT</button>

<div id="circle" class="circle hold">
<div>WAIT</div>
<div style="font-size:14px;margin-top:6px">EXP: --</div>
</div>

<div class="box">
<p>💰 Price: <span id="price">--</span></p>
<p>📊 RSI: <span id="rsi">--</span></p>
<p>📈 EMA: <span id="ema">--</span></p>
</div>

<div class="signalBox">
<p>📢 Signal: <span id="sig">WAIT</span></p>
<p>⏰ Start Time: <span id="startTime">--</span></p>
<p>⌛ Ends: <span id="endTime">--</span></p>
<p>💵 Entry Price: <span id="entryPrice">--</span></p>
<p>🕒 Countdown: <span id="countdown">--</span></p>
<p>📌 Result: <span id="result">--</span></p>
</div>

<div class="stats">
<div class="card">
<div>📊 Signals</div>
<h3 id="totalSignals">0</h3>
</div>

<div class="card">
<div>✅ Wins</div>
<h3 id="wins">0</h3>
</div>

<div class="card">
<div>❌ Loss</div>
<h3 id="losses">0</h3>
</div>
</div>

</div>

<script>

let ws,prices=[],lastSignal="WAIT",lock=false;
let activeTrade=null;
let wins=0,losses=0,totalSignals=0;

function RSI(data,p=14){
if(data.length<p+1)return 50;
let gain=0,loss=0;
for(let i=data.length-p;i<data.length;i++){
let d=data[i]-data[i-1];
if(d>0)gain+=d;
else loss+=Math.abs(d)
}
if(loss===0)return 100;
let rs=(gain/p)/(loss/p);
return 100-(100/(1+rs))
}

function EMA(data,p=20){
let k=2/(p+1),ema=data[0];
for(let i=1;i<data.length;i++){
ema=data[i]*k+ema*(1-k)
}
return ema
}

function formatTime(t){
return new Date(t).toLocaleTimeString()
}

function start(){

prices=[];

if(ws)ws.close();

ws=new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");

ws.onopen=()=>{
ws.send(JSON.stringify({
ticks:document.getElementById("pair").value,
subscribe:1
}))
};

ws.onmessage=(msg)=>{

let data=JSON.parse(msg.data);
if(!data.tick)return;

let price=parseFloat(data.tick.quote);
if(isNaN(price))return;

prices.push(price);
if(prices.length>60)prices.shift();

document.getElementById("price").innerText=price;

if(prices.length<15)return;

let rsi=RSI(prices);
let ema=EMA(prices,20);

document.getElementById("rsi").innerText=rsi.toFixed(2);
document.getElementById("ema").innerText=ema.toFixed(5);

let score=0;

if(price>ema)score+=2;
else score-=2;

if(rsi<30)score+=2;
else if(rsi<45)score+=1;

if(rsi>70)score-=2;
else if(rsi>55)score-=1;

let newSignal="WAIT";

if(score>=3)newSignal="BUY";
else if(score<=-3)newSignal="SELL";

if(lock)return;

if(newSignal!==lastSignal && newSignal!=="WAIT"){

lastSignal=newSignal;
lock=true;

setTimeout(()=>{lock=false},8000);

let duration=60;
let now=Date.now();
let end=now+(duration*1000);

activeTrade={
signal:newSignal,
entry:price,
start:now,
end:end
};

totalSignals++;

document.getElementById("totalSignals").innerText=totalSignals;
document.getElementById("sig").innerText=newSignal;
document.getElementById("startTime").innerText=formatTime(now);
document.getElementById("endTime").innerText=formatTime(end);
document.getElementById("entryPrice").innerText=price;
document.getElementById("result").innerText="RUNNING";

startCountdown();

}

let circle=document.getElementById("circle");

circle.className="circle hold";

if(lastSignal==="BUY")circle.className="circle buy";
if(lastSignal==="SELL")circle.className="circle sell";

circle.innerHTML=`
<div>${lastSignal}</div>
<div style="font-size:14px;margin-top:8px">1 MIN</div>
`;

if(activeTrade && Date.now()>=activeTrade.end){

let result="LOSS";

if(
(activeTrade.signal==="BUY" && price>activeTrade.entry)||
(activeTrade.signal==="SELL" && price<activeTrade.entry)
){
result="GAIN";
wins++;
document.getElementById("wins").innerText=wins;
}else{
losses++;
document.getElementById("losses").innerText=losses;
}

document.getElementById("result").innerHTML=
result==="GAIN"
?'<span class="win">GAIN ✅</span>'
:'<span class="loss">LOSS ❌</span>';

activeTrade=null;

}

};

}

function startCountdown(){

let timer=setInterval(()=>{

if(!activeTrade){
clearInterval(timer);
return;
}

let left=Math.floor((activeTrade.end-Date.now())/1000);

if(left<=0){
document.getElementById("countdown").innerText="0s";
clearInterval(timer);
return;
}

document.getElementById("countdown").innerText=left+"s";

},1000)

}

</script>
</body>
</html>
