<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DARK MAGIC AI FIXED</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Outfit',sans-serif;
background:radial-gradient(circle at top,#1a0f2e,#000);
color:#fff;
padding:18px;
overflow-y:auto;
}

.container{
max-width:460px;
margin:auto;
background:rgba(20,20,20,.85);
border-radius:24px;
padding:20px;
border:1px solid rgba(255,255,255,.08);
}

h1{text-align:center}

select,button{
width:100%;
padding:14px;
margin-top:12px;
border-radius:14px;
border:none;
font-family:'Outfit';
}

select{background:#111;color:#fff;border:1px solid #333}

button{
background:linear-gradient(135deg,#ff006a,#7b61ff);
color:#fff;
font-weight:700;
}

.circle{
width:200px;height:200px;margin:18px auto;
border-radius:50%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:30px;
font-weight:800;
border:4px solid #444;
text-align:center;
}

.buy{color:#00ff84;border-color:#00ff84;box-shadow:0 0 25px #00ff84}
.sell{color:#ff3355;border-color:#ff3355;box-shadow:0 0 25px #ff3355}
.hold{color:#ffcc00}

.box,.stats{
margin-top:12px;
background:rgba(255,255,255,.03);
padding:12px;
border-radius:14px;
font-size:13px;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr 1fr;
text-align:center;
gap:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>⚡ DARK MAGIC AI</h1>

<select id="pair">
<option value="frxEURUSD">EUR/USD</option>
<option value="frxGBPUSD">GBP/USD</option>
<option value="frxUSDJPY">USD/JPY</option>
<option value="frxAUDUSD">AUD/USD</option>
</select>

<select id="tf">
<option value="30">30 Sec</option>
<option value="60" selected>1 Min</option>
<option value="120">2 Min</option>
<option value="180">3 Min</option>
<option value="300">5 Min</option>
</select>

<button onclick="start()">START BOT</button>

<div id="circle" class="circle hold">
<div>WAIT</div>
<div style="font-size:14px">NEXT: --</div>
</div>

<div class="box">
Price: <span id="price">--</span><br>
Trend: <span id="trend">--</span><br>
Next: <span id="next">--</span>
</div>

<div class="stats">
<div>Total<h2 id="total">0</h2></div>
<div>Wins<h2 id="wins">0</h2></div>
<div>Loss<h2 id="loss">0</h2></div>
</div>

</div>

<script>

let ws,prices=[];
let interval=60;
let lastSignalTime=0;
let cooldown=false;

let total=0,wins=0,loss=0;

function SMA(a,n){
if(a.length<n)return 0;
return a.slice(-n).reduce((x,y)=>x+y,0)/n;
}

function trend(){
let f=SMA(prices,5);
let s=SMA(prices,15);
if(f>s)return "UP";
if(f<s)return "DOWN";
return "SIDE";
}

function start(){

prices=[];
interval=parseInt(document.getElementById("tf").value);

if(ws)ws.close();

ws=new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");

ws.onopen=()=>{
ws.send(JSON.stringify({
ticks:document.getElementById("pair").value,
subscribe:1
}));
};

ws.onmessage=(msg)=>{

let d=JSON.parse(msg.data);
if(!d.tick)return;

let price=parseFloat(d.tick.quote);
prices.push(price);
if(prices.length>60)prices.shift();

document.getElementById("price").innerText=price.toFixed(5);

let t=trend();
document.getElementById("trend").innerText=t;

let now=Date.now();
let next=Math.max(0,interval*1000-(now-lastSignalTime));
document.getElementById("next").innerText=Math.floor(next/1000)+"s";

/* ONLY RUN EVERY INTERVAL */
if(now-lastSignalTime < interval*1000 || cooldown) return;

lastSignalTime=now;
cooldown=true;
setTimeout(()=>cooldown=false,3000);

/* ---------------- SAFE SIGNAL ENGINE ---------------- */
let sma10=SMA(prices,10);
let sma20=SMA(prices,20);

let signal;

/* MAIN TREND SIGNAL */
if(t==="UP") signal="BUY";
else if(t==="DOWN") signal="SELL";

/* FALLBACK (IMPORTANT FIX) */
if(!signal){
if(price>sma10)signal="BUY";
else signal="SELL";
}

/* SHOW */
show(signal,price);
};

}

function show(signal,entry){

let c=document.getElementById("circle");

c.className="circle hold";
if(signal==="BUY")c.className="circle buy";
if(signal==="SELL")c.className="circle sell";

c.innerHTML=`<div>${signal}</div><div style="font-size:14px">${interval}s TF</div>`;

total++;
document.getElementById("total").innerText=total;

setTimeout(()=>{
evaluate(signal,entry);
},interval*1000);
}

function evaluate(signal,entry){

let last=prices[prices.length-1];

let win=false;

if(signal==="BUY" && last>entry)win=true;
if(signal==="SELL" && last<entry)win=true;

if(win){
wins++;
document.getElementById("wins").innerText=wins;
}else{
loss++;
document.getElementById("loss").innerText=loss;
}

}

</script>

</body>
</html>
