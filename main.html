<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DARK MAGIC SCALPER AI</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Outfit',sans-serif;
background:radial-gradient(circle at top,#1a0f2e,#000);
color:#fff;
padding:16px;
overflow-y:auto;
}

.container{
max-width:460px;
margin:auto;
background:rgba(20,20,20,.85);
border-radius:24px;
padding:18px;
border:1px solid rgba(255,255,255,.08);
}

h1{
text-align:center;
font-size:22px;
font-weight:800;
background:linear-gradient(90deg,#fff,#aaa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.sub{text-align:center;font-size:12px;color:#aaa}

select,button{
width:100%;
margin-top:10px;
padding:14px;
border-radius:14px;
border:none;
font-family:'Outfit',sans-serif;
}

select{
background:rgba(255,255,255,.05);
color:#fff;
}

button{
background:linear-gradient(135deg,#ff006a,#7b61ff);
color:#fff;
font-weight:700;
cursor:pointer;
}

.circle{
width:180px;
height:180px;
margin:16px auto;
border-radius:50%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:28px;
font-weight:800;
border:4px solid #444;
transition:.3s;
}

.buy{color:#00ff84;border-color:#00ff84;box-shadow:0 0 25px #00ff84}
.sell{color:#ff3355;border-color:#ff3355;box-shadow:0 0 25px #ff3355}
.hold{color:#ffcc00}

.box,.stats{
margin-top:12px;
background:rgba(255,255,255,.03);
padding:12px;
border-radius:14px;
font-size:13px;
border:1px solid rgba(255,255,255,.06);
}

.stats{
display:grid;
grid-template-columns:1fr 1fr 1fr;
text-align:center;
gap:8px;
}
</style>
</head>

<body>

<div class="container">

<h1>⚡ SCALPER AI</h1>
<p class="sub">Fast Signal Engine (30s–1m focus)</p>

<select id="pair">
<option value="frxEURUSD">EUR/USD</option>
<option value="frxGBPUSD">GBP/USD</option>
<option value="frxUSDJPY">USD/JPY</option>
<option value="frxAUDUSD">AUD/USD</option>
</select>

<button onclick="start()">▶ START BOT</button>

<div id="circle" class="circle hold">
<div>WAIT</div>
<div style="font-size:13px">EXP: --</div>
</div>

<div class="box">
<p>Price: <span id="price">--</span></p>
<p>Momentum: <span id="mom">--</span></p>
<p>Speed: <span id="speed">--</span></p>
</div>

<div class="stats">
<div>Total<h2 id="total">0</h2></div>
<div>Wins<h2 id="wins">0</h2></div>
<div>Loss<h2 id="losses">0</h2></div>
</div>

</div>

<script>

let ws, prices=[];
let wins=0,losses=0,total=0;
let lastSignalTime=0;

/* ---------- MOMENTUM ---------- */
function momentum(arr){
return arr[arr.length-1]-arr[arr.length-5];
}

/* ---------- SPEED ---------- */
function speed(arr){
let sum=0;
for(let i=1;i<arr.length;i++){
sum+=Math.abs(arr[i]-arr[i-1]);
}
return sum/arr.length;
}

/* ---------- START ---------- */
function start(){

prices=[];
if(ws)ws.close();

ws=new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");

ws.onopen=()=>{
ws.send(JSON.stringify({
ticks:document.getElementById("pair").value,
subscribe:1
}));
};

ws.onmessage=(msg)=>{

let d=JSON.parse(msg.data);
if(!d.tick)return;

let price=parseFloat(d.tick.quote);
prices.push(price);
if(prices.length>50)prices.shift();

document.getElementById("price").innerText=price;

if(prices.length<10)return;

let mom=momentum(prices);
let spd=speed(prices);

document.getElementById("mom").innerText=mom.toFixed(5);
document.getElementById("speed").innerText=spd.toFixed(6);

/* ---------- SIGNAL ---------- */
let signal="WAIT";

if(spd>0.0001){

if(mom>0.00005) signal="BUY";
else if(mom<-0.00005) signal="SELL";

}

/* ---------- COOLDOWN ---------- */
let now=Date.now();
if(now-lastSignalTime<5000)return;

let expiry=60; // FIXED FAST MODE (1 MIN SCALP)

if(signal!=="WAIT"){

lastSignalTime=now;

total++;
document.getElementById("total").innerText=total;

/* evaluation */
setTimeout(()=>{
let end=prices[prices.length-1];

if(
(signal==="BUY" && end>price)||
(signal==="SELL" && end<price)
){
wins++;
document.getElementById("wins").innerText=wins;
}else{
losses++;
document.getElementById("losses").innerText=losses;
}
},expiry*1000);

}

/* ---------- UI ---------- */
let c=document.getElementById("circle");

c.className="circle hold";
if(signal==="BUY")c.className="circle buy";
if(signal==="SELL")c.className="circle sell";

c.innerHTML=`<div>${signal}</div><div style="font-size:13px">1 MIN SCALP</div>`;

};

}

</script>
</body>
</html>
