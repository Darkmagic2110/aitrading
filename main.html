<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DERIV AI v2 PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Outfit',sans-serif;
background:radial-gradient(circle at top,#120b2e,#000);
color:#fff;
padding:16px;
}

.container{
max-width:460px;
margin:auto;
background:rgba(20,20,20,.85);
border-radius:20px;
padding:18px;
border:1px solid rgba(255,255,255,.08);
}

h1{
text-align:center;
font-size:22px;
font-weight:800;
background:linear-gradient(90deg,#fff,#aaa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:14px;
font-weight:700;
cursor:pointer;
background:linear-gradient(135deg,#ff006a,#7b61ff);
color:#fff;
}

.circle{
width:190px;
height:190px;
margin:18px auto;
border-radius:50%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:30px;
font-weight:800;
border:4px solid #444;
text-align:center;
}

.buy{color:#00ff84;border-color:#00ff84;box-shadow:0 0 25px #00ff84}
.sell{color:#ff3355;border-color:#ff3355;box-shadow:0 0 25px #ff3355}
.hold{color:#ffcc00}

.box{
margin-top:12px;
background:rgba(255,255,255,.04);
padding:12px;
border-radius:14px;
font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<h1>⚡ DERIV AI v2 PRO</h1>

<button onclick="start()">START BOT</button>

<div id="circle" class="circle hold">
<div>WAIT</div>
<div style="font-size:13px">Analyzing market...</div>
</div>

<div class="box">
<p>Price: <span id="price">--</span></p>
<p>RSI: <span id="rsi">--</span></p>
<p>Trend: <span id="trend">--</span></p>
<p>Signal: <span id="signal">WAIT</span></p>
<p>Expiry: <span id="expiry">--</span></p>
</div>

</div>

<script>

let ws;
let prices = [];

/* ---------------- RSI ---------------- */
function RSI(data, period=14){
if(data.length < period+1) return 50;

let gain=0, loss=0;

for(let i=data.length-period;i<data.length;i++){
let diff = data[i]-data[i-1];
if(diff>0) gain+=diff;
else loss+=Math.abs(diff);
}

if(loss===0) return 100;

let rs = (gain/period)/(loss/period);
return 100-(100/(1+rs));
}

/* ---------------- EMA ---------------- */
function EMA(data, period){
let k = 2/(period+1);
let ema = data[0];

for(let i=1;i<data.length;i++){
ema = data[i]*k + ema*(1-k);
}
return ema;
}

/* ---------------- BOLLINGER BANDS ---------------- */
function Bollinger(data, period=20){
let slice = data.slice(-period);
let avg = slice.reduce((a,b)=>a+b,0)/slice.length;

let variance = slice.reduce((a,b)=>a+Math.pow(b-avg,2),0)/slice.length;
let std = Math.sqrt(variance);

return {
upper: avg + (2*std),
lower: avg - (2*std),
middle: avg
};
}

/* ---------------- START BOT ---------------- */
function start(){

prices = [];
if(ws) ws.close();

ws = new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");

ws.onopen = () => {
ws.send(JSON.stringify({
ticks_history: "frxEURUSD",
style: "candles",
granularity: 60,
count: 80,
subscribe: 1
}));
};

ws.onmessage = (msg) => {

let d = JSON.parse(msg.data);
if(!d.candle) return;

let close = parseFloat(d.candle.close);
prices.push(close);

if(prices.length > 80) prices.shift();

document.getElementById("price").innerText = close;

if(prices.length < 25) return;

/* ---------------- INDICATORS ---------------- */
let rsi = RSI(prices);
let fastEMA = EMA(prices.slice(-10), 5);
let slowEMA = EMA(prices.slice(-20), 10);
let bb = Bollinger(prices);

/* ---------------- TREND ---------------- */
let trend = "SIDEWAYS";

if(fastEMA > slowEMA) trend = "UP";
if(fastEMA < slowEMA) trend = "DOWN";

/* ---------------- VOLATILITY FILTER ---------------- */
let price = prices[prices.length-1];
let inRange = price > bb.lower && price < bb.upper;

/* ---------------- SIGNAL ENGINE ---------------- */
let signal = "WAIT";

/* BUY RULE */
if(
trend === "UP" &&
rsi < 70 &&
rsi > 40 &&
inRange
){
signal = "BUY";
}

/* SELL RULE */
else if(
trend === "DOWN" &&
rsi > 30 &&
rsi < 60 &&
inRange
){
signal = "SELL";
}

/* ---------------- EXPIRY LOGIC ---------------- */
let expiry = "1 MIN";

if(Math.abs(rsi-50) > 20){
expiry = "1 MIN";
}
else if(Math.abs(rsi-50) > 10){
expiry = "2 MIN";
}
else{
expiry = "3-5 MIN";
}

/* ---------------- UI ---------------- */
document.getElementById("rsi").innerText = rsi.toFixed(2);
document.getElementById("trend").innerText = trend;
document.getElementById("signal").innerText = signal;
document.getElementById("expiry").innerText = expiry;

let c = document.getElementById("circle");
c.className = "circle hold";

if(signal === "BUY") c.className = "circle buy";
if(signal === "SELL") c.className = "circle sell";

c.innerHTML = `
<div>${signal}</div>
<div style="font-size:13px">${expiry}</div>
`;

};

}

</script>

</body>
</html>
