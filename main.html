<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OTC Signal Bot Countdown</title>

<style>
body{
    background:#0b1220;
    color:white;
    font-family:Arial;
    text-align:center;
}

.card{
    width:360px;
    margin:20px auto;
    background:#111827;
    padding:20px;
    border-radius:12px;
}

#sig{
    font-size:40px;
    font-weight:bold;
}

#countdown{
    font-size:30px;
    color:#38bdf8;
}

button{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.mode{
    background:#38bdf8;
}

.start{
    background:#22c55e;
}

.circle{
    margin-top:10px;
    font-size:14px;
    color:#9ca3af;
}
</style>
</head>

<body>

<h1>OTC Signal Bot (Countdown Mode)</h1>

<div class="card">

    <div id="sig">WAIT</div>
    <div id="countdown">0s</div>

    <button class="mode" onclick="setMode(5)">5 SEC</button>
    <button class="mode" onclick="setMode(10)">10 SEC</button>
    <br>

    <button class="start" onclick="startSignal()">START SIGNAL</button>

    <div class="circle" id="circle">Status: IDLE</div>

</div>

<script>

// ======================
// SETTINGS
// ======================
let mode = 5;
let lock = false;
let lastSignal = "WAIT";

let prices = [];

// simulate EUR/USD price
function generatePrice(){
    let last = prices.length ? prices[prices.length-1] : 1.1000;
    let change = (Math.random()-0.5)*0.001;
    let newPrice = last + change;
    prices.push(newPrice);
    if(prices.length>200) prices.shift();
}

// preload
for(let i=0;i<50;i++) generatePrice();

// ======================
// INDICATORS
// ======================
function ema(period,data){
    let k=2/(period+1);
    let e=data[0];
    for(let i=1;i<data.length;i++){
        e=data[i]*k+e*(1-k);
    }
    return e;
}

function rsi(data){
    let gain=0,loss=0;
    for(let i=data.length-15;i<data.length;i++){
        let diff=data[i]-data[i-1];
        if(diff>0)gain+=diff;
        else loss-=diff;
    }
    let rs=gain/(loss||1);
    return 100-(100/(1+rs));
}

// ======================
// SIGNAL ENGINE
// ======================
function analyze(){

    let ema9=ema(9,prices);
    let ema21=ema(21,prices);
    let r=rsi(prices);

    let score=0;

    if(ema9>ema21)score+=3;
    else score-=3;

    if(r>55)score+=2;
    else if(r<45)score-=2;

    let signal="WAIT";

    if(score>=4)signal="BUY";
    if(score<=-4)signal="SELL";

    return signal;
}

// ======================
// TRADE OBJECT
// ======================
function createTrade(){
    return{
        start:Date.now(),
        end:Date.now()+(mode*1000),
        signal:analyze()
    };
}

// ======================
// COUNTDOWN SYSTEM
// ======================
function startCountdown(trade){

let timer=setInterval(()=>{

    let left=Math.floor((trade.end-Date.now())/1000);

    if(left<=0){

        clearInterval(timer);

        document.getElementById("countdown").innerText="0s";

        evaluateTrade(trade);

        lastSignal="WAIT";
        lock=false;

        document.getElementById("sig").innerText="SEARCHING...";
        updateCircle("WAIT");

        return;
    }

    document.getElementById("countdown").innerText=left+"s";

},1000);

}

// ======================
// EVALUATE TRADE
// ======================
function evaluateTrade(trade){

    generatePrice();

    let newSignal=analyze();

    if(newSignal===trade.signal){
        document.getElementById("sig").innerText=trade.signal+" WIN";
        updateCircle("WIN");
    }else{
        document.getElementById("sig").innerText=trade.signal+" LOSS";
        updateCircle("LOSS");
    }
}

// ======================
// UI HELPERS
// ======================
function updateCircle(status){
    document.getElementById("circle").innerText="Status: "+status;
}

// ======================
// MODE
// ======================
function setMode(m){
    mode=m;
    document.getElementById("circle").innerText="Status: MODE "+m+"s";
}

// ======================
// START SIGNAL
// ======================
function startSignal(){

    if(lock)return;

    lock=true;

    generatePrice();

    let trade=createTrade();

    document.getElementById("sig").innerText="TRADE: "+trade.signal;

    startCountdown(trade);
}

</script>

</body>
</html>
