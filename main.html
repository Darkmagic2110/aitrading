<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DARK MAGIC AI</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Outfit',sans-serif;
background:radial-gradient(circle at top,#1a0f2e,#000);
color:#fff;
padding:18px;
overflow-y:auto;
}

.container{
max-width:460px;
margin:auto;
background:rgba(20,20,20,.85);
border-radius:24px;
padding:20px;
border:1px solid rgba(255,255,255,.08);
}

h1{
text-align:center;
font-size:24px;
font-weight:800;
}

select,button{
width:100%;
margin-top:12px;
padding:14px;
border-radius:16px;
border:none;
outline:none;
font-family:'Outfit',sans-serif;
}

select{
background:#111;
color:#fff;
border:1px solid #333;
}

button{
background:linear-gradient(135deg,#ff006a,#7b61ff);
color:#fff;
font-weight:700;
cursor:pointer;
}

button:active{transform:scale(.98)}

.circle{
width:200px;
height:200px;
margin:18px auto;
border-radius:50%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:30px;
font-weight:800;
border:4px solid #444;
text-align:center;
}

.buy{color:#00ff84;border-color:#00ff84;box-shadow:0 0 25px #00ff84}
.sell{color:#ff3355;border-color:#ff3355;box-shadow:0 0 25px #ff3355}
.hold{color:#ffcc00;border-color:#ffcc00}

.box,.stats{
margin-top:12px;
background:rgba(255,255,255,.03);
padding:12px;
border-radius:14px;
font-size:13px;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr 1fr;
text-align:center;
gap:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>⚡ DARK MAGIC AI</h1>

<select id="pair">
<option value="frxEURUSD">EUR/USD</option>
<option value="frxGBPUSD">GBP/USD</option>
<option value="frxUSDJPY">USD/JPY</option>
<option value="frxAUDUSD">AUD/USD</option>
</select>

<select id="tf">
<option value="30">30 Sec</option>
<option value="60" selected>1 Min</option>
<option value="120">2 Min</option>
<option value="180">3 Min</option>
<option value="300">5 Min</option>
</select>

<button onclick="start()">START BOT ▶</button>

<div id="circle" class="circle hold">
<div>WAIT</div>
<div style="font-size:14px">NEXT: --</div>
</div>

<div class="box">
Price: <span id="price">--</span><br>
Trend: <span id="trend">--</span><br>
Next Signal: <span id="next">--</span>
</div>

<div class="stats">
<div>Total<h2 id="total">0</h2></div>
<div>Wins<h2 id="wins">0</h2></div>
<div>Loss<h2 id="loss">0</h2></div>
</div>

</div>

<script>

let ws;
let prices=[];

let total=0,wins=0,loss=0;

let lastSignalTime=0;
let cooldown=false;
let interval=60;

/* SMA */
function SMA(arr,n){
if(arr.length<n)return 0;
return arr.slice(-n).reduce((a,b)=>a+b,0)/n;
}

/* TREND FILTER */
function getTrend(){
let fast=SMA(prices,5);
let slow=SMA(prices,15);
if(fast>slow)return "UP";
if(fast<slow)return "DOWN";
return "SIDE";
}

function start(){

prices=[];
interval=parseInt(document.getElementById("tf").value);

if(ws)ws.close();

ws=new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");

ws.onopen=()=>{
ws.send(JSON.stringify({
ticks:document.getElementById("pair").value,
subscribe:1
}));
};

ws.onmessage=(msg)=>{

let d=JSON.parse(msg.data);
if(!d.tick)return;

let price=parseFloat(d.tick.quote);
prices.push(price);
if(prices.length>60)prices.shift();

document.getElementById("price").innerText=price.toFixed(5);

let trend=getTrend();
document.getElementById("trend").innerText=trend;

/* NEXT SIGNAL TIMER */
let now=Date.now();
let next=Math.max(0,(interval*1000)-(now-lastSignalTime));
document.getElementById("next").innerText=Math.floor(next/1000)+"s";

/* ONLY SIGNAL EVERY FIXED TIME */
if(now-lastSignalTime < interval*1000 || cooldown) return;

lastSignalTime=now;
cooldown=true;
setTimeout(()=>cooldown=false,4000);

/* SIGNAL ENGINE (SMOOTHED) */
let sma10=SMA(prices,10);
let sma20=SMA(prices,20);

let signal="WAIT";

if(trend==="UP" && sma10>sma20)signal="BUY";
if(trend==="DOWN" && sma10<sma20)signal="SELL";

/* noise filter */
if(Math.abs(price-sma10)<0.00025)signal="WAIT";

showSignal(signal,price);
};

}

function showSignal(signal,price){

let c=document.getElementById("circle");
c.className="circle hold";

if(signal==="BUY")c.className="circle buy";
if(signal==="SELL")c.className="circle sell";

c.innerHTML=`<div>${signal}</div><div style="font-size:14px">${interval}s TF</div>`;

if(signal!=="WAIT"){

total++;
document.getElementById("total").innerText=total;

setTimeout(()=>{
evaluate(signal,price);
}, interval*1000);

}
}

function evaluate(signal,entry){

let last=prices[prices.length-1];

let win=false;

if(signal==="BUY" && last>entry)win=true;
if(signal==="SELL" && last<entry)win=true;

if(win){
wins++;
document.getElementById("wins").innerText=wins;
}else{
loss++;
document.getElementById("loss").innerText=loss;
}

}

</script>

</body>
</html>
