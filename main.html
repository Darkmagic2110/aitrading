<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DERIV AI v2 FIXED</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Outfit',sans-serif;background:radial-gradient(circle at top,#120b2e,#000);color:#fff;padding:16px}
.container{max-width:460px;margin:auto;background:rgba(20,20,20,.85);border-radius:20px;padding:18px;border:1px solid rgba(255,255,255,.08)}
h1{text-align:center;font-size:22px;font-weight:800}
button{width:100%;padding:14px;margin-top:10px;border:none;border-radius:14px;font-weight:700;background:linear-gradient(135deg,#ff006a,#7b61ff);color:#fff}
.circle{width:190px;height:190px;margin:18px auto;border-radius:50%;display:flex;flex-direction:column;justify-content:center;align-items:center;font-size:30px;font-weight:800;border:4px solid #444;text-align:center}
.buy{color:#00ff84;border-color:#00ff84;box-shadow:0 0 25px #00ff84}
.sell{color:#ff3355;border-color:#ff3355;box-shadow:0 0 25px #ff3355}
.hold{color:#ffcc00}
.box{margin-top:12px;background:rgba(255,255,255,.04);padding:12px;border-radius:14px;font-size:13px}
</style>
</head>

<body>

<div class="container">

<h1>⚡ DERIV AI FIXED</h1>

<button onclick="start()">START BOT</button>

<div id="circle" class="circle hold">
<div>WAIT</div>
<div style="font-size:13px">Connecting...</div>
</div>

<div class="box">
<p>Price: <span id="price">--</span></p>
<p>Signal: <span id="signal">WAIT</span></p>
</div>

</div>

<script>

let ws;
let prices = [];

/* RSI */
function RSI(data,p=14){
if(data.length<p+1)return 50;
let g=0,l=0;
for(let i=data.length-p;i<data.length;i++){
let d=data[i]-data[i-1];
if(d>0)g+=d;else l+=Math.abs(d);
}
if(l===0)return 100;
let rs=(g/p)/(l/p);
return 100-(100/(1+rs));
}

/* EMA */
function EMA(data,p){
let k=2/(p+1);
let ema=data[0];
for(let i=1;i<data.length;i++){
ema=data[i]*k+ema*(1-k);
}
return ema;
}

/* START */
function start(){

prices=[];
if(ws)ws.close();

/* ✅ CORRECT DERIV STREAM */
ws = new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");

ws.onopen=()=>{
ws.send(JSON.stringify({
ticks: "frxEURUSD",
subscribe: 1
}));
};

ws.onmessage=(msg)=>{

let d=JSON.parse(msg.data);
if(!d.tick) return;

let price=parseFloat(d.tick.quote);
prices.push(price);

if(prices.length>60)prices.shift();

document.getElementById("price").innerText=price;

if(prices.length<20)return;

let rsi=RSI(prices);
let ema=EMA(prices.slice(-20),10);

let signal="WAIT";

if(price>ema && rsi<70) signal="BUY";
else if(price<ema && rsi>30) signal="SELL";

document.getElementById("signal").innerText=signal;

let c=document.getElementById("circle");
c.className="circle hold";

if(signal==="BUY")c.className="circle buy";
if(signal==="SELL")c.className="circle sell";

c.innerHTML=`<div>${signal}</div><div style="font-size:13px">LIVE</div>`;

};

}

</script>

</body>
</html>
