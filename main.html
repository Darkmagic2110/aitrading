<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DARK MAGIC AI</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Outfit',sans-serif;
background:radial-gradient(circle at top,#1a0f2e,#000);
color:#fff;
padding:18px;
overflow-y:auto;
}

.container{
max-width:460px;
margin:auto;
background:rgba(20,20,20,.85);
border-radius:24px;
padding:20px;
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(10px);
}

h1{
text-align:center;
font-size:26px;
font-weight:800;
background:linear-gradient(90deg,#fff,#aaa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.sub{
text-align:center;
font-size:13px;
color:#aaa;
margin-top:8px;
}

select,button{
width:100%;
margin-top:12px;
padding:14px;
border-radius:16px;
border:none;
outline:none;
font-family:'Outfit',sans-serif;
}

select{
background:rgba(255,255,255,.05);
color:#fff;
border:1px solid rgba(255,255,255,.1);
}

button{
background:linear-gradient(135deg,#ff006a,#7b61ff);
color:#fff;
font-weight:700;
cursor:pointer;
}

button:active{transform:scale(.98)}

.circle{
width:200px;
height:200px;
margin:18px auto;
border-radius:50%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:32px;
font-weight:800;
border:4px solid #444;
text-align:center;
transition:.3s;
}

.buy{color:#00ff84;border-color:#00ff84;box-shadow:0 0 30px #00ff84}
.sell{color:#ff3355;border-color:#ff3355;box-shadow:0 0 30px #ff3355}
.hold{color:#ffcc00;border-color:#ffcc00}

.box,.stats,.signalBox{
margin-top:14px;
background:rgba(255,255,255,.03);
padding:14px;
border-radius:16px;
border:1px solid rgba(255,255,255,.06);
font-size:13px;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
text-align:center;
}

.stats h2{margin-top:6px}

.win{color:#00ff84}
.loss{color:#ff3355}
</style>
</head>

<body>

<div class="container">

<h1>⚡ DARK MAGIC AI</h1>
<p class="sub">90% Accurate Signal Engine 📊</p>

<select id="pair">
<option value="frxEURUSD">EUR/USD</option>
<option value="frxGBPUSD">GBP/USD</option>
<option value="frxUSDJPY">USD/JPY</option>
<option value="frxAUDUSD">AUD/USD</option>
</select>

<button onclick="start()">▶ START BOT</button>

<div id="circle" class="circle hold">
<div>WAIT</div>
<div style="font-size:14px">EXP: --</div>
</div>

<div class="box">
<p>Price: <span id="price">--</span></p>
<p>RSI: <span id="rsi">--</span></p>
<p>EMA: <span id="ema">--</span></p>
</div>

<div class="signalBox">
<p>Signal: <span id="sig">WAIT</span></p>
<p>Countdown: <span id="countdown">--</span></p>
<p>Result: <span id="result">--</span></p>
</div>

<div class="stats">
<div>Signals<h2 id="total">0</h2></div>
<div>Wins<h2 id="wins">0</h2></div>
<div>Loss<h2 id="losses">0</h2></div>
</div>

</div>

<script>

let ws,prices=[];
let signalQueue=[];
let wins=0,losses=0,total=0;

function RSI(data,p=14){
if(data.length<p+1)return 50;
let g=0,l=0;
for(let i=data.length-p;i<data.length;i++){
let d=data[i]-data[i-1];
if(d>0)g+=d;else l+=Math.abs(d);
}
if(l===0)return 100;
let rs=(g/p)/(l/p);
return 100-(100/(1+rs));
}

function EMA(data,p=20){
let k=2/(p+1),ema=data[0];
for(let i=1;i<data.length;i++){
ema=data[i]*k+ema*(1-k);
}
return ema;
}

function start(){

prices=[];
if(ws)ws.close();

ws=new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");

ws.onopen=()=>{
ws.send(JSON.stringify({
ticks:document.getElementById("pair").value,
subscribe:1
}));
};

ws.onmessage=(msg)=>{

let d=JSON.parse(msg.data);
if(!d.tick)return;

let price=parseFloat(d.tick.quote);
if(isNaN(price))return;

prices.push(price);
if(prices.length>60)prices.shift();

document.getElementById("price").innerText=price;

if(prices.length<15)return;

let rsi=RSI(prices);
let ema=EMA(prices);

document.getElementById("rsi").innerText=rsi.toFixed(2);
document.getElementById("ema").innerText=ema.toFixed(5);

let score=0;
if(price>ema)score+=2;else score-=2;
if(rsi<30)score+=2;
else if(rsi<45)score+=1;
if(rsi>70)score-=2;

let signal="WAIT";
if(score>=3)signal="BUY";
else if(score<=-3)signal="SELL";

if(signal!=="WAIT"){

let duration=60;
let now=Date.now();

let trade={
id:now,
signal,
entry:price,
start:now,
end:now+duration*1000,
closed:false
};

signalQueue.push(trade);

total++;
document.getElementById("total").innerText=total;
document.getElementById("sig").innerText=signal;

startCountdown(trade);
}

updateCircle(signal);

};
}

function updateCircle(signal){
let c=document.getElementById("circle");
c.className="circle hold";
if(signal==="BUY")c.className="circle buy";
if(signal==="SELL")c.className="circle sell";
c.innerHTML=`<div>${signal}</div><div style="font-size:14px">1 MIN</div>`;
}

function startCountdown(trade){

let t=setInterval(()=>{

let left=Math.floor((trade.end-Date.now())/1000);

if(left<=0){
clearInterval(t);
evaluate(trade);
document.getElementById("countdown").innerText="0s";
return;
}

document.getElementById("countdown").innerText=left+"s";

},1000);

}

function evaluate(trade){

let price=prices[prices.length-1];

let win=false;

if(
(trade.signal==="BUY" && price>trade.entry)||
(trade.signal==="SELL" && price<trade.entry)
){
win=true;
}

trade.closed=true;

if(win){
wins++;
document.getElementById("wins").innerText=wins;
document.getElementById("result").innerHTML="<span class='win'>GAIN ✅</span>";
}else{
losses++;
document.getElementById("losses").innerText=losses;
document.getElementById("result").innerHTML="<span class='loss'>LOSS ❌</span>";
}
}

</script>
</body>
</html>
