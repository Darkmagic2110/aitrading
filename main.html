<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DARK MAGIC AI PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:'Outfit',sans-serif;
background:radial-gradient(circle at top,#1a0b2e,#000);
color:#fff;
height:100vh;
overflow:hidden;
}

/* APP */
.app{
height:100vh;
padding:16px;
display:flex;
flex-direction:column;
}

/* TOP BAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
}

h1{
font-size:18px;
margin:0;
}

/* MENU BUTTON */
.menuBtn{
font-size:26px;
cursor:pointer;
user-select:none;
}

/* SELECT */
select,button{
width:100%;
padding:14px;
margin-top:10px;
border-radius:14px;
border:none;
font-family:'Outfit',sans-serif;
}

select{
background:rgba(255,255,255,.05);
color:#fff;
}

button{
background:linear-gradient(135deg,#ff006a,#7b61ff);
color:#fff;
font-weight:700;
}

/* CIRCLE */
.circle{
width:220px;
height:220px;
margin:18px auto;
border-radius:50%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:30px;
font-weight:800;
border:4px solid #444;
text-align:center;
transition:.3s;
}

.buy{color:#00ff84;border-color:#00ff84}
.sell{color:#ff3355;border-color:#ff3355}
.wait{color:#ffcc00}

/* PANEL */
.panel{
background:rgba(255,255,255,.04);
padding:12px;
border-radius:14px;
font-size:13px;
margin-top:10px;
}

/* SIDE MENU */
.overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.5);
display:none;
}

.menu{
position:fixed;
right:-70%;
top:0;
width:70%;
height:100%;
background:#0f0f0f;
padding:16px;
transition:.3s;
border-left:1px solid rgba(255,255,255,.1);
}

.menu h3{
margin-top:0;
}

.menuItem{
padding:12px;
margin-top:10px;
background:rgba(255,255,255,.05);
border-radius:10px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="menu" id="menu">
<h3>⚙ MENU</h3>

<div class="menuItem">💰 Purchase Coins</div>
<div class="menuItem">🎁 Referral Code</div>
<div class="menuItem">❓ Help</div>
<div class="menuItem">📞 Customer Support</div>

</div>

<div class="app">

<div class="topbar">
<h1>⚡ DARK MAGIC AI</h1>
<div class="menuBtn" onclick="openMenu()">☰</div>
</div>

<select id="pair">
<option value="frxEURUSD">EUR/USD</option>
<option value="frxGBPUSD">GBP/USD</option>
<option value="frxUSDJPY">USD/JPY</option>
<option value="frxAUDUSD">AUD/USD</option>
</select>

<button onclick="start()">START BOT</button>

<div id="circle" class="circle wait">
<div>WAIT</div>
<div style="font-size:13px" id="cd">--</div>
</div>

<div class="panel">
Price: <span id="price">--</span><br>
Signal: <span id="sig">WAIT</span>
</div>

</div>

<script>

let ws;
let prices=[];
let trade=null;
let timer;

/* MENU */
function openMenu(){
document.getElementById("menu").style.right="0";
document.getElementById("overlay").style.display="block";
}
function closeMenu(){
document.getElementById("menu").style.right="-70%";
document.getElementById("overlay").style.display="none";
}

/* EMA */
function EMA(data,p=20){
let k=2/(p+1),e=data[0];
for(let i=1;i<data.length;i++){
e=data[i]*k+e*(1-k);
}
return e;
}

/* VOLATILITY */
function volatility(data){
let sum=0;
for(let i=1;i<data.length;i++){
sum+=Math.abs(data[i]-data[i-1]);
}
return sum/data.length;
}

/* START */
function start(){

prices=[];
if(ws)ws.close();

ws=new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");

ws.onopen=()=>{
ws.send(JSON.stringify({ticks:"frxEURUSD",subscribe:1}));
};

ws.onmessage=(msg)=>{

let d=JSON.parse(msg.data);
if(!d.tick)return;

let price=parseFloat(d.tick.quote);
prices.push(price);
if(prices.length>120)prices.shift();

document.getElementById("price").innerText=price.toFixed(5);

if(prices.length>30 && !trade){
generateSignal(price);
}

};

}

/* SMART SIGNAL ENGINE */
function generateSignal(price){

let ema=EMA(prices.slice(-30),15);
let vol=volatility(prices.slice(-20));

let momentum=prices[prices.length-1]-prices[prices.length-8];

let score=0;

/* TREND */
if(price>ema)score+=2;
else score-=2;

/* MOMENTUM */
if(momentum>0)score+=1;
else score-=1;

/* VOLATILITY FILTER */
if(vol<0.0003)return; // ignore weak/noisy market

let signal="WAIT";

if(score>=2)signal="BUY";
else if(score<=-2)signal="SELL";

if(signal==="WAIT")return;

trade={
signal,
entry:price,
end:Date.now()+30000
};

document.getElementById("sig").innerText=signal;
updateCircle(signal);

startCountdown();

}

/* UI */
function updateCircle(sig){

let c=document.getElementById("circle");
c.className="circle wait";

if(sig==="BUY")c.className="circle buy";
if(sig==="SELL")c.className="circle sell";

c.innerHTML=`<div>${sig}</div><div id="cd">30s TRADE</div>`;
}

/* COUNTDOWN */
function startCountdown(){

timer=setInterval(()=>{

let left=Math.floor((trade.end-Date.now())/1000);

document.getElementById("cd").innerText=left+"s";

if(left<=0){
clearInterval(timer);
trade=null;
}

},1000);

}

</script>

</body>
</html>
