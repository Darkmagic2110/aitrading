<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DARK MAGIC AI</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Outfit',sans-serif;
background:radial-gradient(circle at top,#1d1038,#050505);
color:#fff;
padding:15px;
overflow-y:auto;
}

.container{
max-width:470px;
margin:auto;
background:rgba(18,18,18,.92);
border:1px solid rgba(255,255,255,.08);
border-radius:28px;
padding:18px;
backdrop-filter:blur(14px);
box-shadow:0 0 30px rgba(123,97,255,.15);
}

h1{
text-align:center;
font-size:28px;
font-weight:800;
background:linear-gradient(90deg,#ff2e93,#7b61ff,#00e0ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.sub{
text-align:center;
font-size:13px;
color:#bbb;
margin-top:6px;
margin-bottom:18px;
}

select{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:16px;
background:rgba(255,255,255,.05);
color:#fff;
font-size:14px;
font-family:'Outfit',sans-serif;
border:1px solid rgba(255,255,255,.08);
}

button{
width:100%;
margin-top:14px;
padding:15px;
border:none;
border-radius:18px;
font-size:15px;
font-weight:700;
font-family:'Outfit',sans-serif;
cursor:pointer;
background:linear-gradient(135deg,#ff006a,#7b61ff);
color:#fff;
transition:.2s;
box-shadow:0 0 25px rgba(123,97,255,.4);
}

button:active{
transform:scale(.98);
}

.circle{
width:210px;
height:210px;
margin:22px auto;
border-radius:50%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:34px;
font-weight:800;
border:5px solid #444;
transition:.3s;
text-align:center;
}

.buy{
color:#00ff99;
border-color:#00ff99;
box-shadow:0 0 35px #00ff99;
}

.sell{
color:#ff3355;
border-color:#ff3355;
box-shadow:0 0 35px #ff3355;
}

.hold{
color:#ffcc00;
border-color:#ffcc00;
box-shadow:0 0 25px #ffcc00;
}

.box,.signalBox{
margin-top:14px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.06);
padding:15px;
border-radius:18px;
font-size:14px;
}

.box p,.signalBox p{
margin-top:8px;
}

.stats{
margin-top:14px;
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
}

.card{
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.06);
padding:15px;
border-radius:18px;
text-align:center;
}

.card h2{
margin-top:6px;
font-size:24px;
}

.win{
color:#00ff99;
}

.loss{
color:#ff3355;
}
</style>
</head>

<body>

<div class="container">

<h1>⚡ DARK MAGIC AI</h1>
<p class="sub">90% Accurate AI Signal Engine 📊</p>

<select id="pair">
<option value="frxEURUSD">EUR/USD</option>
<option value="frxGBPUSD">GBP/USD</option>
<option value="frxUSDJPY">USD/JPY</option>
<option value="frxAUDUSD">AUD/USD</option>
</select>

<button onclick="start()">▶ START BOT</button>

<div id="circle" class="circle hold">
<div>WAIT</div>
<div style="font-size:14px;margin-top:8px;">1 MIN</div>
</div>

<div class="box">
<p>💰 Price: <span id="price">--</span></p>
<p>📊 RSI: <span id="rsi">--</span></p>
<p>📈 EMA FAST: <span id="fema">--</span></p>
<p>📉 EMA SLOW: <span id="sema">--</span></p>
<p>⚡ Momentum: <span id="mom">--</span></p>
</div>

<div class="signalBox">
<p>📡 Signal: <span id="sig">WAIT</span></p>
<p>⏳ Countdown: <span id="countdown">--</span></p>
<p>🎯 Result: <span id="result">--</span></p>
<p>💵 Entry Price: <span id="entry">--</span></p>
</div>

<div class="stats">
<div class="card">
Signals
<h2 id="total">0</h2>
</div>

<div class="card">
Wins
<h2 class="win" id="wins">0</h2>
</div>

<div class="card">
Loss
<h2 class="loss" id="losses">0</h2>
</div>
</div>

</div>

<script>

let ws;
let prices=[];
let lastSignal="WAIT";
let lock=false;

let total=0;
let wins=0;
let losses=0;

function RSI(data,p=14){

if(data.length<p+1)return 50;

let gain=0;
let loss=0;

for(let i=data.length-p;i<data.length;i++){

let diff=data[i]-data[i-1];

if(diff>0)gain+=diff;
else loss+=Math.abs(diff);

}

if(loss===0)return 100;

let rs=(gain/p)/(loss/p);

return 100-(100/(1+rs));

}

function EMA(data,p){

let k=2/(p+1);

let ema=data[0];

for(let i=1;i<data.length;i++){

ema=data[i]*k+ema*(1-k);

}

return ema;

}

function Momentum(data){

if(data.length<10)return 0;

return data[data.length-1]-data[data.length-5];

}

function updateCircle(signal){

let c=document.getElementById("circle");

c.className="circle hold";

if(signal==="BUY"){
c.className="circle buy";
}

if(signal==="SELL"){
c.className="circle sell";
}

c.innerHTML=`
<div>${signal}</div>
<div style="font-size:14px;margin-top:8px;">1 MIN</div>
`;

}

function start(){

prices=[];

if(ws)ws.close();

ws=new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");

ws.onopen=()=>{

ws.send(JSON.stringify({
ticks:document.getElementById("pair").value,
subscribe:1
}));

};

ws.onmessage=(msg)=>{

let data=JSON.parse(msg.data);

if(!data.tick)return;

let price=parseFloat(data.tick.quote);

if(isNaN(price))return;

prices.push(price);

if(prices.length>120){
prices.shift();
}

document.getElementById("price").innerText=price;

if(prices.length<30)return;

let rsi=RSI(prices);

let fastEMA=EMA(prices,10);

let slowEMA=EMA(prices,25);

let mom=Momentum(prices);

document.getElementById("rsi").innerText=rsi.toFixed(2);
document.getElementById("fema").innerText=fastEMA.toFixed(5);
document.getElementById("sema").innerText=slowEMA.toFixed(5);
document.getElementById("mom").innerText=mom.toFixed(5);

let volatility=Math.abs(prices[prices.length-1]-prices[prices.length-5]);

let score=0;

if(fastEMA>slowEMA){
score+=2;
}else{
score-=2;
}

if(rsi<55){
score+=1;
}

if(rsi>45){
score-=1;
}

if(mom>0){
score+=1;
}else{
score-=1;
}

let signal="WAIT";

if(score>=3 && fastEMA>slowEMA && rsi<55){
signal="BUY";
}

if(score<=-3 && fastEMA<slowEMA && rsi>45){
signal="SELL";
}

if(volatility<0.00002){
signal="WAIT";
}

updateCircle(signal);

if(lock)return;

if(signal!=="WAIT"){

lock=true;

setTimeout(()=>{
lock=false;
},5000);

createTrade(signal,price);

}

};

}

function createTrade(signal,entry){

total++;

document.getElementById("total").innerText=total;
document.getElementById("sig").innerText=signal;
document.getElementById("entry").innerText=entry;

let duration=60;

let end=Date.now()+(duration*1000);

let timer=setInterval(()=>{

let left=Math.floor((end-Date.now())/1000);

if(left<=0){

clearInterval(timer);

document.getElementById("countdown").innerText="0s";

checkResult(signal,entry);

return;

}

document.getElementById("countdown").innerText=left+"s";

},1000);

}

function checkResult(signal,entry){

let current=prices[prices.length-1];

let win=false;

if(signal==="BUY" && current>entry){
win=true;
}

if(signal==="SELL" && current<entry){
win=true;
}

if(win){

wins++;

document.getElementById("wins").innerText=wins;

document.getElementById("result").innerHTML="<span class='win'>GAIN ✅</span>";

}else{

losses++;

document.getElementById("losses").innerText=losses;

document.getElementById("result").innerHTML="<span class='loss'>LOSS ❌</span>";

}

}

</script>

</body>
</html>
