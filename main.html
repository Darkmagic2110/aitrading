<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DARK MAGIC AI</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Outfit',sans-serif;
background:radial-gradient(circle at top,#1a0f2e,#000);
color:#fff;
padding:18px;
overflow-y:auto;
}

/* BALANCE PANEL */

#balanceContainer{
position:fixed;
top:12px;
right:12px;
background:rgba(20,20,20,.95);
padding:8px 14px;
border-radius:20px;
display:flex;
align-items:center;
gap:8px;
z-index:9999;
border:1px solid rgba(255,215,0,.25);
box-shadow:0 0 18px rgba(255,215,0,.25);
backdrop-filter:blur(10px);
}

#coinEmoji{font-size:20px;}
#balanceAmount{font-size:15px;font-weight:700;color:#ffd700;}
#dmText{font-size:13px;color:#fff;opacity:.9;}

#addBalanceBtn{
width:28px;height:28px;border-radius:50%;
border:none;background:linear-gradient(135deg,#ffd700,#ff9900);
color:#000;font-size:18px;font-weight:800;
cursor:pointer;transition:.2s;
}
#addBalanceBtn:active{transform:scale(.95);}

.container{
max-width:460px;margin:auto;margin-top:60px;
background:rgba(20,20,20,.85);
border-radius:24px;padding:20px;
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(10px);
}

h1{
text-align:center;font-size:26px;font-weight:800;
background:linear-gradient(90deg,#fff,#aaa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.sub{text-align:center;font-size:13px;color:#aaa;margin-top:8px;}

select,button{
width:100%;margin-top:12px;padding:14px;
border-radius:16px;border:none;outline:none;
font-family:'Outfit',sans-serif;
}

select{
background:rgba(255,255,255,.05);
color:#fff;border:1px solid rgba(255,255,255,.1);
}

button{
background:linear-gradient(135deg,#ff006a,#7b61ff);
color:#fff;font-weight:700;
cursor:pointer;font-size:15px;
transition:.2s;
}
button:active{transform:scale(.98);}

.circle{
width:220px;height:220px;margin:20px auto;
border-radius:50%;
display:flex;flex-direction:column;
justify-content:center;align-items:center;
font-size:38px;font-weight:800;
border:4px solid #444;text-align:center;
transition:.4s;
}

.buy{color:#00ff84;border-color:#00ff84;box-shadow:0 0 50px #00ff84;}
.sell{color:#ff3355;border-color:#ff3355;box-shadow:0 0 50px #ff3355;}
.hold{color:#ffcc00;border-color:#ffcc00;box-shadow:0 0 35px #ffcc00;}

.box,.signalBox,.history{
margin-top:14px;background:rgba(255,255,255,.03);
padding:14px;border-radius:16px;
border:1px solid rgba(255,255,255,.06);
font-size:13px;
}

.stats{
display:grid;grid-template-columns:1fr 1fr 1fr;
gap:10px;margin-top:14px;
}

.card{
background:rgba(255,255,255,.03);
padding:12px;border-radius:16px;
text-align:center;border:1px solid rgba(255,255,255,.06);
}

.card h2{margin:6px 0 0;font-size:24px;}
.win{color:#00ff84;}
.loss{color:#ff3355;}

.historyItem{
padding:10px;border-bottom:1px solid rgba(255,255,255,.06);
font-size:12px;
}

.badge{
padding:4px 8px;border-radius:8px;
font-size:11px;font-weight:700;
}

.buyBadge{background:#003d22;color:#00ff84;}
.sellBadge{background:#3d0012;color:#ff3355;}

</style>
</head>

<body>

<div id="balanceContainer">
<span id="coinEmoji">🪙</span>
<span id="balanceAmount">0</span>
<span id="dmText">DM COINS</span>
<button id="addBalanceBtn">+</button>
</div>

<div class="container">

<h1>⚡ DARK MAGIC AI</h1>
<p class="sub">30s Trend Direction Engine 📊</p>

<select id="pair">
<option value="frxEURUSD">EUR/USD</option>
<option value="frxGBPUSD">GBP/USD</option>
<option value="frxUSDJPY">USD/JPY</option>
<option value="frxAUDUSD">AUD/USD</option>
<option value="frxEURJPY">EUR/JPY</option>
<option value="frxUSDCHF">USD/CHF</option>
</select>

<button onclick="start()">▶ START BOT</button>

<div id="circle" class="circle hold">
<div>WAIT</div>
<div style="font-size:14px">30 SEC MODE</div>
</div>

<div class="box">
<p>💰 Price: <span id="price">--</span></p>
<p>📊 RSI: <span id="rsi">--</span></p>
<p>📈 EMA FAST: <span id="emaFast">--</span></p>
<p>📉 EMA SLOW: <span id="emaSlow">--</span></p>
<p>⚡ Momentum: <span id="momentum">--</span></p>
<p>🔥 Strength: <span id="strength">--</span></p>
<p>📈 Trend: <span id="trend">--</span></p>
<p>🎯 Accuracy: <span id="accuracy">0%</span></p>
</div>

<div class="signalBox">
<p>📡 Signal: <span id="sig">WAIT</span></p>
<p>⏳ Countdown: <span id="countdown">--</span></p>
<p>🎯 Result: <span id="result">--</span></p>
</div>

<div class="stats">
<div class="card">Signals<h2 id="total">0</h2></div>
<div class="card">Wins<h2 id="wins" class="win">0</h2></div>
<div class="card">Loss<h2 id="losses" class="loss">0</h2></div>
</div>

<div class="history">
<h3>📜 Signal History</h3>
<div id="history"></div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyDvFDByPPo9zgwKLdPaREz1OVMQCXmPfrs",
authDomain: "bets-d795d.firebaseapp.com",
projectId: "bets-d795d",
storageBucket: "bets-d795d.appspot.com",
messagingSenderId: "384386108287",
appId: "1:384386108287:android:d238a5ec8068d9bb9be84a",
databaseURL: "https://bets-d795d-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

document.getElementById("addBalanceBtn").onclick=()=>{
window.location.href="deposit.html";
};

firebase.auth().onAuthStateChanged(user=>{
if(!user){
window.location.href="login.html";
return;
}
listenBalance(user.uid);
});

function listenBalance(uid){
db.ref("users/"+uid+"/balance").on("value",snap=>{
document.getElementById("balanceAmount").innerText =
snap.val()!=null ? Math.floor(snap.val()) : 0;
});
}

/* BOT CORE */

let ws;
let prices=[];
let wins=0;
let losses=0;
let total=0;

let activeTrade=null;
let timer=null;

/* RSI */
function RSI(data,period=14){
if(data.length<period+1)return 50;
let g=0,l=0;
for(let i=data.length-period;i<data.length;i++){
let d=data[i]-data[i-1];
if(d>0)g+=d; else l+=Math.abs(d);
}
if(l===0)return 100;
let rs=(g/period)/(l/period);
return 100-(100/(1+rs));
}

/* EMA */
function EMA(data,p){
let k=2/(p+1),ema=data[0];
for(let i=1;i<data.length;i++)ema=data[i]*k+ema*(1-k);
return ema;
}

/* MOMENTUM */
function momentum(data){
if(data.length<10)return 0;
return data[data.length-1]-data[data.length-10];
}

/* VOL */
function volatility(data){
if(data.length<20)return 0;
let r=data.slice(-20);
return Math.max(...r)-Math.min(...r);
}

/* TREND ENGINE (ONLY DIRECTION BASED) */
function getTrend(price,emaFast,emaSlow,rsi,mom,vol){

let score=0;

if(emaFast>emaSlow)score+=4;
else score-=4;

if(rsi>55)score+=2;
if(rsi<45)score-=2;

if(mom>0)score+=2;
else score-=2;

if(vol>0.0002)score+=1;

let signal="WAIT";
let trend="SIDEWAYS";

if(score>=5){
signal="BUY";
trend="UPTREND";
}

if(score<=-5){
signal="SELL";
trend="DOWNTREND";
}

return {signal,trend,score};
}

/* UI */
function updateCircle(signal){
let c=document.getElementById("circle");
c.className="circle hold";
if(signal==="BUY")c.className="circle buy";
if(signal==="SELL")c.className="circle sell";
c.innerHTML=`<div>${signal}</div><div style="font-size:14px">30 SEC</div>`;
}

/* START */
function start(){

prices=[];
if(ws)ws.close();

ws=new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");

ws.onopen=()=>{
ws.send(JSON.stringify({
ticks:document.getElementById("pair").value,
subscribe:1
}));
};

ws.onmessage=(msg)=>{

let data=JSON.parse(msg.data);
if(!data.tick)return;

let price=parseFloat(data.tick.quote);
if(isNaN(price))return;

prices.push(price);
if(prices.length>300)prices.shift();

document.getElementById("price").innerText=price;
if(prices.length<40)return;

let rsi=RSI(prices);
let emaFast=EMA(prices,9);
let emaSlow=EMA(prices,21);
let mom=momentum(prices);
let vol=volatility(prices);

document.getElementById("rsi").innerText=rsi.toFixed(2);
document.getElementById("emaFast").innerText=emaFast.toFixed(5);
document.getElementById("emaSlow").innerText=emaSlow.toFixed(5);
document.getElementById("momentum").innerText=mom.toFixed(5);

let analysis=getTrend(price,emaFast,emaSlow,rsi,mom,vol);

document.getElementById("trend").innerText=analysis.trend;
document.getElementById("strength").innerText=analysis.score;

/* CREATE TRADE */
if(!activeTrade && analysis.signal!=="WAIT"){

activeTrade={
signal:analysis.signal,
entry:price,
end:Date.now()+30000
};

total++;
document.getElementById("total").innerText=total;
document.getElementById("sig").innerText=analysis.signal;

updateCircle(analysis.signal);
startCountdown(activeTrade);
}

};
}

/* COUNTDOWN */
function startCountdown(trade){

timer=setInterval(()=>{

let left=Math.floor((trade.end-Date.now())/1000);
document.getElementById("countdown").innerText=left+"s";

if(left<=0){

clearInterval(timer);

/* FINAL CHECK USING CURRENT MARKET STATE */
let current=prices[prices.length-1];

let rsi=RSI(prices);
let emaFast=EMA(prices,9);
let emaSlow=EMA(prices,21);
let mom=momentum(prices);
let vol=volatility(prices);

let final=getTrend(current,emaFast,emaSlow,rsi,mom,vol);

let win=false;

/* WIN ONLY IF TREND MATCHES SIGNAL */
if(final.signal===trade.signal){
win=true;
}

if(win){
wins++;
document.getElementById("wins").innerText=wins;
document.getElementById("result").innerHTML="<span class='win'>WIN ✅</span>";
}else{
losses++;
document.getElementById("losses").innerText=losses;
document.getElementById("result").innerHTML="<span class='loss'>LOSS ❌</span>";
}

let accuracy= total>0 ? ((wins/total)*100).toFixed(1) : 0;
document.getElementById("accuracy").innerText=accuracy+"%";

addHistory(trade,win,current,final.trend);

activeTrade=null;
updateCircle("WAIT");

return;
}

},1000);

}

/* HISTORY */
function addHistory(trade,win,current,trend){

let history=document.getElementById("history");

let item=document.createElement("div");
item.className="historyItem";

let badge=trade.signal==="BUY"
? "<span class='badge buyBadge'>BUY</span>"
: "<span class='badge sellBadge'>SELL</span>";

item.innerHTML=`
${badge}<br><br>
Entry: ${trade.entry}<br>
Close: ${current}<br>
Final Trend: ${trend}<br>
Result: ${win ? "<span class='win'>WIN</span>" : "<span class='loss'>LOSS</span>"}
`;

history.prepend(item);
}

</script>

</body>
</html>
