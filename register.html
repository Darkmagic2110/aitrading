<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DARK MAGIC TRADING BOT - Register</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background: radial-gradient(circle at top,#0a0a0a,#000);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.container{
    width:92%;
    max-width:420px;
    background:rgba(20,20,20,0.95);
    padding:20px;
    border-radius:18px;
    border:1px solid #333;
    box-shadow:0 0 30px rgba(255,0,80,0.2);
    text-align:center;
}

h2{
    color:#ff2e63;
    text-shadow:0 0 10px #ff2e63;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:none;
    outline:none;
    background:#111;
    color:white;
    border:1px solid #333;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
    background:linear-gradient(90deg,#ff0057,#ffb300);
    color:black;
}

label{
    font-size:13px;
}

a{
    color:#00e5ff;
    cursor:pointer;
    display:block;
    margin-top:10px;
}

/* TOAST */
.toast{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#111;
    padding:12px 18px;
    border-radius:10px;
    border:1px solid #333;
    opacity:0;
    transition:0.5s;
}

.toast.show{
    opacity:1;
}
</style>
</head>

<body>

<div class="container">

<h2>⚡ DARK MAGIC TRADING BOT</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<input type="password" id="confirm" placeholder="Confirm Password">

<label>
<input type="checkbox" onclick="togglePass()"> Show Password
</label>

<button onclick="register()">REGISTER</button>

<a onclick="goLogin()">Already have an account? Login</a>

</div>

<div id="toast" class="toast"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

/* ---------------- FIREBASE CONFIG (FIXED) ---------------- */
const firebaseConfig = {
    apiKey: "AIzaSyDvFDByPPo9zgwKLdPaREz1OVMQCXmPfrs",
    authDomain: "bets-d795d.firebaseapp.com",
    databaseURL: "https://bets-d795d-default-rtdb.firebaseio.com",
    projectId: "bets-d795d",
    storageBucket: "bets-d795d.appspot.com",
    messagingSenderId: "PASTE_SENDER_ID",
    appId: "1:384386108287:android:d238a5ec8068d9bb9be84a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

/* ---------------- REGISTER ---------------- */
window.register = async function(){

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;
    let confirm = document.getElementById("confirm").value;

    if(!email || !password || !confirm){
        showToast("Please fill all fields");
        return;
    }

    if(password !== confirm){
        showToast("Passwords do not match");
        return;
    }

    try{

        let userCred = await createUserWithEmailAndPassword(auth, email, password);
        let user = userCred.user;

        /* ---------------- SAVE TO LOCAL STORAGE ---------------- */
        localStorage.setItem("userEmail", email);
        localStorage.setItem("userUID", user.uid);

        /* ---------------- SAVE TO FIREBASE DB ---------------- */
        await set(ref(db, "users/" + user.uid), {
            email: email,
            uid: user.uid,
            createdAt: Date.now(),
            lastLogin: Date.now()
        });

        showToast("Account registered successfully");

        setTimeout(()=>{
            window.location.href = "index.html";
        },2000);

    }catch(error){

        if(error.code === "auth/email-already-in-use"){
            showToast("Email already exists");
        }
        else if(error.code === "auth/invalid-email"){
            showToast("Invalid email");
        }
        else if(error.code === "auth/weak-password"){
            showToast("Weak password");
        }
        else{
            showToast("Registration failed");
        }

    }
};

/* ---------------- PASSWORD TOGGLE ---------------- */
window.togglePass = function(){
    let p = document.getElementById("password");
    let c = document.getElementById("confirm");

    let type = p.type === "password" ? "text" : "password";
    p.type = type;
    c.type = type;
};

/* ---------------- LOGIN REDIRECT ---------------- */
window.goLogin = function(){
    window.location.href = "index.html";
};

/* ---------------- TOAST ---------------- */
window.showToast = function(msg){
    let toast = document.getElementById("toast");
    toast.innerText = msg;
    toast.classList.add("show");

    setTimeout(()=>{
        toast.classList.remove("show");
    },3000);
};

</script>

</body>
</html>
